---
- name: Create network
  community.docker.docker_network:
    name: dockerproxy
    state: present

- name: Start dockerproxy
  community.docker.docker_compose_v2:
    project_name: dockerproxy
    pull: "{{ dockerproxy_pull_policy }}"
    state: present # Ensure the services are started
    definition:
      networks:
        dockerproxy:
          external: true
      services:
        dockerproxy:
          image: "{{ dockerproxy_image }}"
          container_name: dockerproxy
          environment:
            LOG_LEVEL: "{{ dockerproxy_log_level }}"
            POST: "1"
            CONTAINERS: "1"
            IMAGES: "1"
            INFO: "1"
            NETWORKS: "1"
            SERVICES: "1"
            TASKS: "1"
            VOLUMES: "1"
            DISABLE_IPV6: "0"
          ports:
            - >-
              {{ (dockerproxy_bind_address | default('')) ~ ':'
                 if dockerproxy_bind_address | default('') | length > 0 else '' }}{{ dockerproxy_port | default(2375) }}:2375
          networks:
            - dockerproxy
          volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro # Mounted as read-only
          logging:
            driver: "{{ dockerproxy_log_driver }}"
            options:
              max-size: "{{ dockerproxy_log_max_size }}"
              max-file: "{{ dockerproxy_log_max_files | string }}"
          restart: unless-stopped
  register: output

- name: Debug docker compose output
  ansible.builtin.debug:
    var: output # Print the entire output variable to understand its structure

- name: Assert dockerproxy container is running
  ansible.builtin.assert:
    that:
      # Ensure the container exists
      - >
        output.containers
        | selectattr('Name', 'equalto', 'dockerproxy')
        | list | length > 0
      # Check if the container is running
      - >
        output.containers
        | selectattr('Name', 'equalto', 'dockerproxy')
        | map(attribute='State')
        | list | first == 'running'
