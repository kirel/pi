- name: Ensure ComfyUI storage directory exists
  ansible.builtin.file:
    path: "{{ comfyui_storage_path }}"
    state: directory
    mode: "0755"
    owner: "{{ uid }}"
    group: "{{ gid }}"
    recurse: yes
  become: true

- name: Ensure ComfyUI container is running
  community.docker.docker_container:
    name: "{{ comfyui_container_name }}"
    image: "{{ comfyui_image }}"
    image_name_mismatch: recreate
    pull: true
    state: started
    # user: "{{ comfyui_user }}"
    restart_policy: unless-stopped
    device_requests:
      - driver: nvidia
        device_ids: ["{{ blackwell_gpu_uuid }}"]
        capabilities:
          - ["gpu"]
    ports:
      - "{{ comfyui_port }}:8188"
    volumes:
      - "{{ comfyui_storage_path }}:/root"
    env:
      CLI_ARGS: "{{ comfyui_cli_args }}"
      HOME: "/root"
    labels:
      homepage.group: "{{ services.comfyui.group }}"
      homepage.name: "{{ services.comfyui.name }}"
      homepage.href: "https://{{ services.comfyui.domain }}"
      homepage.icon: "{{ services.comfyui.icon }}"
      homepage.server: "{{ inventory_hostname }}"
      homepage.container: "{{ comfyui_container_name }}"
    security_opts:
      - "label=type:nvidia_container_t"

  become: true

- name: Configure git safe.directory for ComfyUI
  community.docker.docker_container_exec:
    container: "{{ comfyui_container_name }}"
    argv:
      - git
      - config
      - --global
      - --add
      - safe.directory
      - /root/ComfyUI
  changed_when: false
  # Retry in case container was just started
  retries: 3
  delay: 2

- name: Configure restricted SSH key for OpenClaw (ComfyUI docker exec only)
  ansible.posix.authorized_key:
    user: "{{ ansible_user }}"
    key: "{{ comfyui_openclaw_ssh_key }}"
    key_options: 'command="docker exec {{ comfyui_container_name }} sh -c \"$SSH_ORIGINAL_COMMAND\"",restrict'
    state: present
    exclusive: false
    manage_dir: true
  become: true
  when: comfyui_openclaw_ssh_enabled | default(true)
