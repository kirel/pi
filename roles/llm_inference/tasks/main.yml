---
# tasks file for llm_inference

- name: Ensure llama-swap config directory exists
  ansible.builtin.file:
    path: "{{ llamaswap_config_path }}"
    state: directory
    mode: "0755"
  become: true

- name: Ensure llama-swap cache directory is owned by container user
  ansible.builtin.file:
    path: "{{ llamaswap_config_path }}/cache"
    state: directory
    owner: "10001"
    group: "10001"
    recurse: true
  become: true

- name: Ensure llama-swap build context exists
  ansible.builtin.file:
    path: "{{ llamaswap_build_context }}"
    state: directory
    mode: "0755"
  become: true

- name: Template llama-swap+vllm Dockerfile
  ansible.builtin.template:
    src: Dockerfile.llamaswap.j2
    dest: "{{ llamaswap_build_context }}/Dockerfile"
    mode: "0644"
  become: true
  notify: Restart llama-swap

- name: Create llama-swap config file
  ansible.builtin.template:
    src: llamaswap_config.yaml.j2
    dest: "{{ llamaswap_config_path }}/config.yaml"
    mode: "0644"
  become: true
  notify: Restart llama-swap

- name: Build llama-swap+vllm image
  community.docker.docker_image:
    name: "{{ llamaswap_image }}"
    source: build
    force_source: true
    build:
      path: "{{ llamaswap_build_context }}"
      pull: true
      nocache: false
    state: present
  become: true
  notify: Restart llama-swap

- name: Start the llama-swap container
  community.docker.docker_container:
    name: "{{ llamaswap_container_name }}"
    image: "{{ llamaswap_image }}"
    image_name_mismatch: recreate
    pull: false
    state: started
    restart_policy: unless-stopped
    # init: true → Docker injects tini as PID 1 to reap zombie children.
    # vLLM spawns EngineCore worker subprocesses that become defunct on
    # failure; without an init reaper they hold CUDA contexts (leaking
    # ~23 GB of GPU memory) until the container restarts. llama-swap is
    # PID 1 by default and does not reap.
    init: true
    ports:
      - "{{ llamaswap_port }}:8080"
    volumes:
      - "{{ llamaswap_config_path }}/config.yaml:/app/config.yaml"
      - "{{ llamaswap_config_path }}/cache:/app/.cache"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/usr/bin/docker:/usr/bin/docker"
    device_requests:
      - driver: nvidia
        device_ids: ["{{ ampere_gpu_uuid }}"]
        capabilities:
          - [gpu]
    capabilities:
      - SYS_NICE
    env:
      LLAMASWAP_RESTART_TOKEN: "{{ ansible_facts.date_time.epoch }}"
    labels:
      homepage.group: "{{ services['llama-swap'].group }}"
      homepage.name: "{{ services['llama-swap'].name }}"
      homepage.href: "https://{{ services['llama-swap'].domain }}"
      homepage.icon: llama.png
      homepage.server: "{{ inventory_hostname }}"
      homepage.container: "{{ llamaswap_container_name }}"
  become: true
