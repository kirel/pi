---
# tasks file for llm_inference

- name: Stop llama-swap container when disabled
  community.docker.docker_container:
    name: "{{ llamaswap_container_name }}"
    state: absent
  become: true
  when: not (llamaswap_enabled | bool)

- name: Ensure llama-swap config directory exists
  ansible.builtin.file:
    path: "{{ llamaswap_config_path }}"
    state: directory
    mode: "0755"
  become: true
  when: llamaswap_enabled | bool

- name: Ensure llama-swap cache directory is owned by container user
  ansible.builtin.file:
    path: "{{ llamaswap_config_path }}/cache"
    state: directory
    owner: "10001"
    group: "10001"
    recurse: true
  become: true
  when: llamaswap_enabled | bool

- name: Ensure qwen3-tts data directory is writable by container user
  ansible.builtin.file:
    path: "{{ llamaswap_qwen3_tts_voices_path }}"
    state: directory
    owner: "10001"
    group: "10001"
    mode: "0755"
  become: true
  when: llamaswap_enabled | bool

- name: Ensure qwen3-TTS voice cache directory is writable by container user
  ansible.builtin.file:
    path: "{{ llamaswap_qwen3_tts_voice_cache_path }}"
    state: directory
    owner: "10001"
    group: "10001"
    mode: "0755"
  become: true
  when: llamaswap_enabled | bool

- name: Ensure uv cache directory is writable by container user
  ansible.builtin.file:
    path: "{{ llamaswap_qwen3_tts_uv_cache_path }}"
    state: directory
    owner: "10001"
    group: "10001"
    mode: "0755"
  become: true
  when: llamaswap_enabled | bool

- name: Ensure llama-swap build context exists
  ansible.builtin.file:
    path: "{{ llamaswap_build_context }}"
    state: directory
    mode: "0755"
  become: true
  when: llamaswap_enabled | bool

- name: Inspect Docker socket for llama-swap lifecycle management
  ansible.builtin.stat:
    path: /var/run/docker.sock
  register: llamaswap_docker_socket
  become: true
  when: llamaswap_enabled | bool

- name: Require Docker socket for llama-swap lifecycle management
  ansible.builtin.assert:
    that:
      - llamaswap_docker_socket.stat.exists
      - llamaswap_docker_socket.stat.gid is defined
    fail_msg: "llama-swap requires /var/run/docker.sock to manage Parakeet"
  when: llamaswap_enabled | bool

- name: Ensure llama-swap backend network exists
  community.docker.docker_network:
    name: "{{ llamaswap_backend_network }}"
    state: present
  become: true
  when: llamaswap_enabled | bool

- name: Pull pinned Parakeet image
  community.docker.docker_image:
    name: "{{ llamaswap_parakeet_image }}"
    source: pull
    state: present
  become: true
  when: llamaswap_enabled | bool

- name: Template llama-swap Dockerfile
  ansible.builtin.template:
    src: Dockerfile.llamaswap.j2
    dest: "{{ llamaswap_build_context }}/Dockerfile"
    mode: "0644"
  become: true
  notify: Restart llama-swap
  when: llamaswap_enabled | bool

- name: Template qwen3-TTS voice design presets
  ansible.builtin.template:
    src: qwen3_tts_design_presets.json.j2
    dest: "{{ llamaswap_qwen3_tts_presets_path }}"
    mode: "0644"
  become: true
  notify: Restart llama-swap
  when: llamaswap_enabled | bool

- name: Template qwen3-TTS OpenAI-compatible server script
  ansible.builtin.template:
    src: qwen3_tts_openai_server.py.j2
    dest: "{{ llamaswap_qwen3_tts_server_script }}"
    mode: "0755"
  become: true
  notify: Restart llama-swap
  when: llamaswap_enabled | bool

- name: Create llama-swap config file
  ansible.builtin.template:
    src: llamaswap_config.yaml.j2
    dest: "{{ llamaswap_config_path }}/config.yaml"
    mode: "0644"
  become: true
  notify: Restart llama-swap
  when: llamaswap_enabled | bool

- name: Build llama-swap image
  community.docker.docker_image:
    name: "{{ llamaswap_image }}"
    source: build
    force_source: true
    build:
      path: "{{ llamaswap_build_context }}"
      pull: true
      nocache: false
    state: present
  become: true
  notify: Restart llama-swap
  when: llamaswap_enabled | bool

- name: Remove stale llama-swap-managed Parakeet container before restart
  community.docker.docker_container:
    name: "{{ llamaswap_parakeet_container_name }}"
    state: absent
  become: true
  when: llamaswap_enabled | bool

- name: Start the llama-swap container
  community.docker.docker_container:
    name: "{{ llamaswap_container_name }}"
    image: "{{ llamaswap_image }}"
    image_name_mismatch: recreate
    pull: false
    state: started
    restart_policy: unless-stopped
    # init: true → Docker injects tini as PID 1 to reap zombie children.
    # vLLM spawns EngineCore worker subprocesses that become defunct on
    # failure; without an init reaper they hold CUDA contexts (leaking
    # ~23 GB of GPU memory) until the container restarts. llama-swap is
    # PID 1 by default and does not reap.
    init: true
    ports:
      - "{{ llamaswap_port }}:8080"
    shm_size: "2g"
    volumes:
      - "{{ llamaswap_config_path }}/config.yaml:/app/config.yaml"
      - "{{ llamaswap_config_path }}/cache:/app/.cache"
      - "{{ llamaswap_qwen3_tts_voices_path }}:{{ llamaswap_qwen3_tts_container_path }}"
      - "{{ llamaswap_qwen3_tts_uv_cache_path }}:/app/.uv-cache"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/usr/bin/docker:/usr/bin/docker"
    groups:
      - "{{ llamaswap_docker_socket.stat.gid | string }}"
    networks:
      - name: "{{ llamaswap_backend_network }}"
    device_requests:
      - driver: nvidia
        device_ids: ["{{ gpu_3090_0_uuid }}", "{{ gpu_3090_1_uuid }}"]
        capabilities:
          - [gpu]
    capabilities:
      - SYS_NICE
    env:
      LLAMASWAP_RESTART_TOKEN: "{{ ansible_facts.date_time.epoch }}"
    labels:
      homepage.group: "{{ services['llama-swap'].group }}"
      homepage.name: "{{ services['llama-swap'].name }}"
      homepage.href: "https://{{ services['llama-swap'].domain }}"
      homepage.icon: llama.png
      homepage.server: "{{ inventory_hostname }}"
      homepage.container: "{{ llamaswap_container_name }}"
  become: true
  when: llamaswap_enabled | bool

- name: Apply pending llama-swap restart before warmup
  ansible.builtin.meta: flush_handlers

- name: Wait for llama-swap API before ASR warmup
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ llamaswap_port }}/health"
    method: GET
    status_code: 200
  register: llamaswap_health
  retries: 30
  delay: 2
  until: llamaswap_health.status == 200
  when:
    - llamaswap_enabled | bool
    - not ansible_check_mode

- name: Create short silent WAV for Parakeet warmup
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ llamaswap_container_name }}"
      - ffmpeg
      - -hide_banner
      - -loglevel
      - error
      - -f
      - lavfi
      - -i
      - anullsrc=r=16000:cl=mono
      - -t
      - "1"
      - -y
      - /tmp/parakeet-warmup.wav
  changed_when: false
  become: true
  when:
    - llamaswap_enabled | bool
    - not ansible_check_mode

- name: Warm Parakeet through llama-swap
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ llamaswap_container_name }}"
      - curl
      - --fail
      - --show-error
      - --silent
      - --max-time
      - "300"
      - -F
      - file=@/tmp/parakeet-warmup.wav
      - -F
      - model=parakeet-tdt-0.6b
      - http://127.0.0.1:8080/v1/audio/transcriptions
  register: llamaswap_parakeet_warmup
  changed_when: false
  retries: 3
  delay: 5
  until: llamaswap_parakeet_warmup.rc == 0
  become: true
  when:
    - llamaswap_enabled | bool
    - not ansible_check_mode
