---
# defaults file for llm_inference

# --- llama-swap Settings ---
llamaswap_enabled: true
llamaswap_container_name: "llama-swap"
llamaswap_image: "llama-swap:local"
llamaswap_port: "8080"
llamaswap_config_path: "{{ llamaswap_host_path }}"
llamaswap_build_context: "{{ llamaswap_config_path }}/build"
# Persisted Qwen3-TTS settings mounted into the llama-swap container.
llamaswap_qwen3_tts_repo: "https://github.com/andimarafioti/faster-qwen3-tts.git"
llamaswap_qwen3_tts_repo_ref: "main"
llamaswap_qwen3_tts_repo_path: "/app/faster-qwen3-tts"
llamaswap_qwen3_tts_venv_path: "/app/qwen3-tts-venv"
llamaswap_qwen3_tts_voices_path: "{{ llamaswap_config_path }}/qwen3-tts"
llamaswap_qwen3_tts_container_path: "/app/qwen3-tts"
llamaswap_qwen3_tts_uv_cache_path: "{{ llamaswap_config_path }}/uv-cache"
# seconds llama-swap waits for a subprocess to become healthy before killing it.
# Generous default to allow first-time HF downloads (vLLM AWQ weights ~20GB).
llamaswap_health_check_timeout: 1800
llamaswap_preload: []
llamaswap_qwen3_tts_runtime_model: Qwen/Qwen3-TTS-12Hz-1.7B-Base
llamaswap_qwen3_tts_design_model: Qwen/Qwen3-TTS-12Hz-1.7B-VoiceDesign
llamaswap_qwen3_tts_presets_path: "{{ llamaswap_qwen3_tts_voices_path }}/design-voices.json"
llamaswap_qwen3_tts_presets_container_path: "{{ llamaswap_qwen3_tts_container_path }}/design-voices.json"
llamaswap_qwen3_tts_server_script: "{{ llamaswap_qwen3_tts_voices_path }}/qwen3_tts_openai_server.py"
llamaswap_qwen3_tts_server_container_script: "{{ llamaswap_qwen3_tts_container_path }}/qwen3_tts_openai_server.py"
llamaswap_qwen3_tts_voice_cache_path: "{{ llamaswap_qwen3_tts_voices_path }}/voice-cache"
llamaswap_qwen3_tts_voice_cache_container_path: "{{ llamaswap_qwen3_tts_container_path }}/voice-cache"
llamaswap_qwen3_tts_voice_cache_probe_text: "Guten Tag, ich spreche mit einer ruhigen und natuerlichen deutschen Stimme. Diese Referenz enthaelt klare Betonung, normale Satzmelodie und genug Laenge, damit die Stimme spaeter konsistent wiederverwendet werden kann."
