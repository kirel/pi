---
- name: Ensure Wan2GP directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
    owner: "{{ username_personal }}"
    group: "{{ username_personal }}"
  loop:
    - { path: "{{ wan2gp_base_dir }}", mode: "0755" }
    - { path: "{{ wan2gp_cache_root }}", mode: "0700" }
    - { path: "{{ wan2gp_cache_root }}/numba", mode: "0700" }
    - { path: "{{ wan2gp_cache_root }}/matplotlib", mode: "0700" }
    - { path: "{{ wan2gp_cache_root }}/huggingface", mode: "0700" }
    - { path: "{{ wan2gp_cache_root }}/torch", mode: "0700" }
    - { path: "{{ wan2gp_ai_media_bin_dir }}", mode: "0755" }
    - { path: "{{ wan2gp_generated_root }}", mode: "0755" }
    - { path: "{{ wan2gp_generated_staging_dir }}", mode: "0700" }
    - { path: "{{ wan2gp_generated_versions_dir }}", mode: "0700" }
    - { path: "{{ wan2gp_generated_versions_dir }}/visuals", mode: "0700" }
    - { path: "{{ wan2gp_generated_versions_dir }}/music", mode: "0700" }
    - { path: "{{ wan2gp_generated_visuals_dir }}", mode: "0775" }
    - { path: "{{ wan2gp_generated_music_dir }}", mode: "0775" }

- name: Look up Wan2GP archive owner
  ansible.builtin.getent:
    database: passwd
    key: "{{ username_personal }}"

- name: Install ai-media archive CLI
  ansible.builtin.copy:
    src: ai_media.py
    dest: "{{ wan2gp_ai_media_bin }}"
    owner: "{{ username_personal }}"
    group: "{{ username_personal }}"
    mode: "0755"

- name: Checkout Wan2GP
  ansible.builtin.git:
    repo: "{{ wan2gp_repo_url }}"
    dest: "{{ wan2gp_app_path }}"
    version: "{{ wan2gp_repo_version }}"
    update: true
    force: true
  become_user: "{{ username_personal }}"
  register: wan2gp_checkout_result

- name: Ensure Wan2GP checkpoint directory is writable by container user
  ansible.builtin.file:
    path: "{{ wan2gp_app_path }}/ckpts"
    state: directory
    mode: "0755"
    owner: "{{ username_personal }}"
    group: "{{ username_personal }}"
    recurse: true

- name: Ensure Wan2GP Docker helper directory exists
  ansible.builtin.file:
    path: "{{ wan2gp_app_path }}/docker"
    state: directory
    mode: "0755"
    owner: "{{ username_personal }}"
    group: "{{ username_personal }}"

- name: Write Wan2GP SageAttention setup patch helper
  ansible.builtin.copy:
    dest: "{{ wan2gp_app_path }}/docker/patch_setup.py"
    mode: "0644"
    owner: "{{ username_personal }}"
    group: "{{ username_personal }}"
    content: |
      import os
      with open('setup.py', 'r') as f:
          content = f.read()

      arch_list = os.environ.get('TORCH_CUDA_ARCH_LIST')
      arch_set = '{' + ', '.join([f'"{arch}"' for arch in arch_list.split(';')]) + '}'

      old_section = '''compute_capabilities = set()
      device_count = torch.cuda.device_count()
      for i in range(device_count):
          major, minor = torch.cuda.get_device_capability(i)
          if major < 8:
              warnings.warn(f"skipping GPU {i} with compute capability {major}.{minor}")
              continue
          compute_capabilities.add(f"{major}.{minor}")'''

      new_section = 'compute_capabilities = ' + arch_set + '''
      print(f"Manually set compute capabilities: {compute_capabilities}")'''

      if old_section in content:
          content = content.replace(old_section, new_section)
      elif 'TORCH_CUDA_ARCH_LIST' in content:
          print('SageAttention setup.py already supports TORCH_CUDA_ARCH_LIST; no patch needed')
      else:
          raise SystemExit('SageAttention setup.py GPU detection section not found; update Wan2GP patch_setup.py')

      with open('setup.py', 'w') as f:
          f.write(content)
  register: wan2gp_patch_setup_result

- name: Restrict Wan2GP Docker build context
  ansible.builtin.copy:
    dest: "{{ wan2gp_app_path }}/.dockerignore"
    owner: "{{ username_personal }}"
    group: "{{ username_personal }}"
    mode: "0644"
    content: |
      **
      !Dockerfile
      !requirements.txt
      !entrypoint.sh
      !docker/
      !docker/patch_setup.py

- name: Make Wan2GP Dockerfile compatible with classic Docker builder
  ansible.builtin.replace:
    path: "{{ wan2gp_app_path }}/Dockerfile"
    regexp: 'COPY <<EOF /tmp/patch_setup\.py[\s\S]*?^EOF$'
    replace: 'COPY docker/patch_setup.py /tmp/patch_setup.py'
  register: wan2gp_dockerfile_compat_result

- name: Detect Wan2GP GPU name
  ansible.builtin.command:
    cmd: "nvidia-smi -i {{ gpu_5060ti_uuid }} --query-gpu=name --format=csv,noheader,nounits"
  register: wan2gp_gpu_name_result
  changed_when: false

- name: Detect Wan2GP GPU VRAM
  ansible.builtin.command:
    cmd: "nvidia-smi -i {{ gpu_5060ti_uuid }} --query-gpu=memory.total --format=csv,noheader,nounits"
  register: wan2gp_gpu_vram_result
  changed_when: false

- name: Configure Wan2GP GPU build settings
  ansible.builtin.set_fact:
    wan2gp_gpu_name: "{{ wan2gp_gpu_name_result.stdout | trim }}"
    wan2gp_gpu_vram_gb: "{{ ((wan2gp_gpu_vram_result.stdout | trim | int) / 1024) | round(0, 'floor') | int }}"
    wan2gp_effective_cuda_architectures: >-
      {% if wan2gp_cuda_architectures != 'auto' %}{{ wan2gp_cuda_architectures }}
      {% elif 'RTX 50' in wan2gp_gpu_name_result.stdout or '5090' in wan2gp_gpu_name_result.stdout or '5080' in wan2gp_gpu_name_result.stdout or '5070' in wan2gp_gpu_name_result.stdout or '5060' in wan2gp_gpu_name_result.stdout %}12.0
      {% elif 'H100' in wan2gp_gpu_name_result.stdout or 'H800' in wan2gp_gpu_name_result.stdout %}9.0
      {% elif 'RTX 40' in wan2gp_gpu_name_result.stdout or '4090' in wan2gp_gpu_name_result.stdout or '4080' in wan2gp_gpu_name_result.stdout or '4070' in wan2gp_gpu_name_result.stdout or '4060' in wan2gp_gpu_name_result.stdout %}8.9
      {% elif 'RTX 30' in wan2gp_gpu_name_result.stdout or '3090' in wan2gp_gpu_name_result.stdout or '3080' in wan2gp_gpu_name_result.stdout or '3070' in wan2gp_gpu_name_result.stdout or '3060' in wan2gp_gpu_name_result.stdout %}8.6
      {% elif 'A100' in wan2gp_gpu_name_result.stdout or 'A800' in wan2gp_gpu_name_result.stdout or 'A40' in wan2gp_gpu_name_result.stdout %}8.0
      {% elif 'Tesla V100' in wan2gp_gpu_name_result.stdout %}7.0
      {% elif 'RTX 20' in wan2gp_gpu_name_result.stdout or '2080' in wan2gp_gpu_name_result.stdout or '2070' in wan2gp_gpu_name_result.stdout or '2060' in wan2gp_gpu_name_result.stdout or 'Titan RTX' in wan2gp_gpu_name_result.stdout %}7.5
      {% elif 'GTX 16' in wan2gp_gpu_name_result.stdout or '1660' in wan2gp_gpu_name_result.stdout or '1650' in wan2gp_gpu_name_result.stdout %}7.5
      {% elif 'GTX 10' in wan2gp_gpu_name_result.stdout or '1080' in wan2gp_gpu_name_result.stdout or '1070' in wan2gp_gpu_name_result.stdout or '1060' in wan2gp_gpu_name_result.stdout or 'Tesla P100' in wan2gp_gpu_name_result.stdout %}6.1
      {% else %}12.0{% endif %}
    wan2gp_effective_profile: >-
      {% if wan2gp_profile != 'auto' %}{{ wan2gp_profile }}
      {% elif ('RTX 50' in wan2gp_gpu_name_result.stdout or '5090' in wan2gp_gpu_name_result.stdout or '5080' in wan2gp_gpu_name_result.stdout or '5070' in wan2gp_gpu_name_result.stdout or '5060' in wan2gp_gpu_name_result.stdout or 'A100' in wan2gp_gpu_name_result.stdout or 'A800' in wan2gp_gpu_name_result.stdout or 'H100' in wan2gp_gpu_name_result.stdout or 'H800' in wan2gp_gpu_name_result.stdout) and ((wan2gp_gpu_vram_result.stdout | trim | int) >= 24576) %}1
      {% elif 'RTX 50' in wan2gp_gpu_name_result.stdout or '5090' in wan2gp_gpu_name_result.stdout or '5080' in wan2gp_gpu_name_result.stdout or '5070' in wan2gp_gpu_name_result.stdout or '5060' in wan2gp_gpu_name_result.stdout or 'A100' in wan2gp_gpu_name_result.stdout or 'A800' in wan2gp_gpu_name_result.stdout or 'H100' in wan2gp_gpu_name_result.stdout or 'H800' in wan2gp_gpu_name_result.stdout %}2
      {% elif ('RTX 40' in wan2gp_gpu_name_result.stdout or '4090' in wan2gp_gpu_name_result.stdout or 'RTX 30' in wan2gp_gpu_name_result.stdout or '3090' in wan2gp_gpu_name_result.stdout) and ((wan2gp_gpu_vram_result.stdout | trim | int) >= 24576) %}3
      {% elif 'RTX 40' in wan2gp_gpu_name_result.stdout or '4090' in wan2gp_gpu_name_result.stdout or 'RTX 30' in wan2gp_gpu_name_result.stdout or '3090' in wan2gp_gpu_name_result.stdout %}2
      {% elif ('4080' in wan2gp_gpu_name_result.stdout or '4070' in wan2gp_gpu_name_result.stdout or '3080' in wan2gp_gpu_name_result.stdout or '3070' in wan2gp_gpu_name_result.stdout or 'RTX 20' in wan2gp_gpu_name_result.stdout or '2080' in wan2gp_gpu_name_result.stdout or '2070' in wan2gp_gpu_name_result.stdout) and ((wan2gp_gpu_vram_result.stdout | trim | int) >= 12288) %}2
      {% elif '4060' in wan2gp_gpu_name_result.stdout or '3060' in wan2gp_gpu_name_result.stdout or '2060' in wan2gp_gpu_name_result.stdout or 'GTX 16' in wan2gp_gpu_name_result.stdout or '1660' in wan2gp_gpu_name_result.stdout or '1650' in wan2gp_gpu_name_result.stdout %}4
      {% else %}4{% endif %}

- name: Configure Wan2GP runtime arguments
  ansible.builtin.set_fact:
    wan2gp_runtime_args: >-
      {{
        [
          '--profile', wan2gp_effective_profile | trim,
          '--attention', wan2gp_attention,
          '--preload', wan2gp_preload | string,
          '--perc-reserved-mem-max', wan2gp_perc_reserved_mem_max | string
        ]
        + (['--fp16'] if wan2gp_fp16 | bool else [])
        + (['--compile'] if wan2gp_compile | bool else [])
      }}

- name: Configure Wan2GP container command
  ansible.builtin.set_fact:
    wan2gp_container_command: >-
      {{
        [
          '--mcp',
          '--mcp-transport', wan2gp_mcp_transport,
          '--mcp-host', wan2gp_mcp_host,
          '--mcp-port', wan2gp_mcp_port | string
        ] + wan2gp_runtime_args
        if wan2gp_mode == 'mcp'
        else wan2gp_runtime_args
      }}

- name: Build Wan2GP image
  community.docker.docker_image:
    name: "{{ wan2gp_image }}"
    source: build
    force_source: >-
      {{
        (wan2gp_rebuild_image | bool)
        or
        ((wan2gp_checkout_result.before | default(''))
         != (wan2gp_checkout_result.after | default('')))
      }}
    build:
      path: "{{ wan2gp_app_path }}"
      args:
        CUDA_ARCHITECTURES: "{{ wan2gp_effective_cuda_architectures | trim }}"
  register: wan2gp_image_build_result

- name: Ensure Wan2GP container is running
  community.docker.docker_container:
    name: "{{ wan2gp_container_name }}"
    image: "{{ wan2gp_image }}"
    image_name_mismatch: recreate
    state: started
    recreate: "{{ wan2gp_image_build_result.changed }}"
    restart_policy: unless-stopped
    device_requests:
      - driver: nvidia
        device_ids: ["{{ gpu_5060ti_uuid }}"]
        capabilities:
          - ["gpu"]
    ports:
      - "{{ wan2gp_port }}:{{ wan2gp_mcp_port }}"
    volumes:
      - "{{ wan2gp_app_path }}:/workspace"
      - "{{ wan2gp_generated_root }}:/generated"
      - "{{ wan2gp_ai_media_bin }}:{{ wan2gp_ai_media_container_bin }}:ro"
      - "{{ wan2gp_cache_root }}/numba:/home/user/.cache/numba"
      - "{{ wan2gp_cache_root }}/matplotlib:/home/user/.cache/matplotlib"
      - "{{ wan2gp_cache_root }}/huggingface:/home/user/.cache/huggingface"
      - "{{ wan2gp_cache_root }}/torch:/home/user/.cache/torch"
    env:
      NVIDIA_VISIBLE_DEVICES: "{{ gpu_5060ti_uuid }}"
      NVIDIA_DRIVER_CAPABILITIES: all
      AI_MEDIA_ROOT: /generated
      AI_MEDIA_ALLOWED_SOURCE_ROOTS: "{{ wan2gp_ai_media_source_roots | join(':') }}"
      AI_MEDIA_OWNER_UID: "{{ ansible_facts.getent_passwd[username_personal][1] }}"
      AI_MEDIA_OWNER_GID: "{{ ansible_facts.getent_passwd[username_personal][2] }}"
    command: "{{ wan2gp_container_command }}"
    labels:
      homepage.group: "{{ services.wan2gp.group }}"
      homepage.name: "{{ services.wan2gp.name }}"
      homepage.href: "https://{{ services.wan2gp.domain }}"
      homepage.icon: "{{ services.wan2gp.icon }}"
      homepage.server: "{{ inventory_hostname }}"
      homepage.container: "{{ wan2gp_container_name }}"
    security_opts:
      - "label=type:nvidia_container_t"

- name: Verify ai-media runtime dependencies inside Wan2GP
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ wan2gp_container_name }}"
      - sh
      - -lc
      - "command -v ffmpeg >/dev/null && command -v ffprobe >/dev/null && python3 -c 'import PIL' && test -x {{ wan2gp_ai_media_container_bin }}"
  changed_when: false

- name: Configure restricted SSH key for Wan2GP
  ansible.posix.authorized_key:
    user: "{{ ansible_user }}"
    key: "{{ wan2gp_openclaw_ssh_key }}"
    key_options: 'command="docker exec -i {{ wan2gp_container_name }} sh -c \"$SSH_ORIGINAL_COMMAND\"",restrict'
    state: present
    exclusive: false
    manage_dir: true
  when: wan2gp_openclaw_ssh_enabled | default(true)
