---
wan2gp_repo_url: https://github.com/deepbeepmeep/Wan2GP.git
wan2gp_repo_version: main
wan2gp_base_dir: /opt/wan2gp
wan2gp_app_path: "{{ wan2gp_base_dir }}/app"
wan2gp_cache_root: "{{ wan2gp_base_dir }}/cache"
wan2gp_image: local/wan2gp:latest
wan2gp_container_name: wan2gp
wan2gp_port: 7860
wan2gp_cuda_architectures: auto
# WanGP memory profile. Profile 5 is documented as minimum system-RAM usage;
# profile 2 keeps unused models in reserved RAM and caused host memory pressure
# when MCP generation jobs were started from LiteLLM.
wan2gp_profile: "5"
wan2gp_mode: mcp
wan2gp_mcp_transport: streamable-http
wan2gp_mcp_host: "0.0.0.0"
wan2gp_mcp_port: "{{ wan2gp_port }}"
wan2gp_attention: sage
wan2gp_fp16: true
wan2gp_compile: false
wan2gp_preload: 0
wan2gp_perc_reserved_mem_max: "0.2"
wan2gp_rebuild_image: false
wan2gp_openclaw_ssh_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPDUljPF2X+7jVxeXfEMO6DN4kNXQfovYzMGcpCxZKhU hermes-wangp-ssh-key"
wan2gp_openclaw_ssh_enabled: true

# Durable AI-generated media archive. Only visuals/ and music/ are synced;
# .staging and .stversions stay outside Syncthing and media-library scans.
wan2gp_generated_root: "{{ wan2gp_base_dir }}/generated"
wan2gp_generated_staging_dir: "{{ wan2gp_generated_root }}/.staging"
wan2gp_generated_versions_dir: "{{ wan2gp_generated_root }}/.stversions"
wan2gp_generated_visuals_dir: "{{ wan2gp_generated_root }}/visuals"
wan2gp_generated_music_dir: "{{ wan2gp_generated_root }}/music"
wan2gp_ai_media_bin_dir: "{{ wan2gp_base_dir }}/bin"
wan2gp_ai_media_bin: "{{ wan2gp_ai_media_bin_dir }}/ai-media"
wan2gp_ai_media_container_bin: /usr/local/bin/ai-media
wan2gp_ai_media_source_roots:
  - /workspace/outputs
  - /workspace/hermes_outputs
