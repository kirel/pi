---
- name: Remove legacy NodeSource deb822 repository with conflicting signed-by
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/nodesource.sources
    state: absent
  tags: [node, openclaw]

- name: Install base CLI packages
  ansible.builtin.apt:
    name:
      - zsh
      - tmux
      - mosh
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [homebrew, mise]

- name: Ensure Hetzner users exist with configured shell
  ansible.builtin.user:
    name: "{{ item.name }}"
    shell: "{{ item.shell | default('/usr/bin/zsh') }}"
    create_home: true
    groups: "{{ 'sudo' if item.sudo | default(false) else '' }}"
    append: "{{ item.sudo | default(false) }}"
    state: present
  loop: "{{ hetzner_users }}"
  tags: [homebrew, mise, users, hermes]

- name: Add authorized SSH keys for Hetzner users
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    state: present
    exclusive: false
    manage_dir: true
  loop: "{{ hetzner_users | subelements('authorized_keys', skip_missing=True) }}"
  tags: [users]

- name: Allow configured Hetzner users passwordless sudo
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL) NOPASSWD: ALL\n"
    owner: root
    group: root
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s
  loop: "{{ hetzner_users | selectattr('passwordless_sudo', 'defined') | selectattr('passwordless_sudo') | list }}"
  tags: [homebrew, mise, users]

- name: Remove passwordless sudo for users without it
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ item.name }}"
    state: absent
  loop: "{{ hetzner_users | rejectattr('passwordless_sudo', 'defined') | list + (hetzner_users | selectattr('passwordless_sudo', 'defined') | rejectattr('passwordless_sudo') | list) }}"
  tags: [users]

- name: Ensure Homebrew admin group exists
  ansible.builtin.group:
    name: "{{ hetzner_homebrew_group }}"
    state: present
  tags: [homebrew, mise]

- name: Add configured users to Homebrew admin group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: "{{ hetzner_homebrew_group }}"
    append: true
  loop: "{{ hetzner_homebrew_users }}"
  tags: [homebrew, mise]

- name: Install Linuxbrew prerequisites
  ansible.builtin.apt:
    name:
      - build-essential
      - ca-certificates
      - curl
      - file
      - git
      - procps
      - acl
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [homebrew, mise]

- name: Install Homebrew using the official non-interactive installer
  ansible.builtin.shell: |
    set -o pipefail
    NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  args:
    executable: /bin/bash
    creates: "{{ hetzner_homebrew_prefix }}/bin/brew"
  become: true
  become_user: "{{ hetzner_homebrew_user }}"
  environment:
    HOME: "/home/{{ hetzner_homebrew_user }}"
  tags: [homebrew, mise]

- name: Allow Homebrew admin group to manage Homebrew prefix
  ansible.builtin.file:
    path: "{{ hetzner_homebrew_prefix }}"
    owner: "{{ hetzner_homebrew_user }}"
    group: "{{ hetzner_homebrew_group }}"
    mode: '0775'
    recurse: true
  tags: [homebrew, mise]

- name: Remove setgid bits from Homebrew prefix to keep Ruby happy
  ansible.builtin.command: "find {{ hetzner_homebrew_prefix }} -perm /2000 -exec chmod g-s {} +"
  changed_when: false
  tags: [homebrew, mise]

- name: Set default ACLs so Homebrew admin group can write new files
  ansible.builtin.command: "setfacl -R -m g:{{ hetzner_homebrew_group }}:rwX,d:g:{{ hetzner_homebrew_group }}:rwX {{ hetzner_homebrew_prefix }}"
  changed_when: false
  tags: [homebrew, mise]

- name: Add Homebrew shell environment system-wide for POSIX login shells
  ansible.builtin.copy:
    dest: /etc/profile.d/homebrew.sh
    content: |
      if [ -x {{ hetzner_homebrew_prefix }}/bin/brew ]; then
        eval "$({{ hetzner_homebrew_prefix }}/bin/brew shellenv)"
      fi
    owner: root
    group: root
    mode: '0644'
  tags: [homebrew, mise]

- name: Add Homebrew shell environment to Hetzner user zsh startup files
  ansible.builtin.lineinfile:
    path: "/home/{{ item.0.name }}/{{ item.1 }}"
    line: 'eval "$({{ hetzner_homebrew_prefix }}/bin/brew shellenv)"'
    create: true
    owner: "{{ item.0.name }}"
    group: "{{ item.0.name }}"
    mode: '0644'
  loop: "{{ hetzner_users | product(['.zprofile', '.zshrc']) | list }}"
  tags: [homebrew, mise]

- name: Install Homebrew formulae
  community.general.homebrew:
    name: "{{ hetzner_homebrew_formulae }}"
    state: present
    update_homebrew: true
    path: "{{ hetzner_homebrew_prefix }}/bin"
  become: true
  become_user: "{{ hetzner_homebrew_user }}"
  environment:
    HOME: "/home/{{ hetzner_homebrew_user }}"
    PATH: "{{ hetzner_homebrew_prefix }}/bin:{{ ansible_env.PATH }}"
  tags: [homebrew, mise]

- name: Enable mise in zsh
  ansible.builtin.lineinfile:
    path: "/home/{{ hetzner_homebrew_user }}/.zshrc"
    line: 'eval "$(mise activate zsh)"'
    create: true
    owner: "{{ hetzner_homebrew_user }}"
    group: "{{ hetzner_homebrew_user }}"
    mode: '0644'
  tags: [mise]

- name: Ensure user-local bin is on PATH for Hermes users
  ansible.builtin.lineinfile:
    path: "/home/{{ item }}/.zshrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    create: true
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: '0644'
  loop: "{{ hetzner_hermes_users }}"
  tags: [hermes]

- name: Install Hermes Agent for configured users
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL {{ hetzner_hermes_install_url }} | bash -s -- --skip-setup --skip-browser
  args:
    executable: /bin/bash
    creates: "/home/{{ item }}/.local/bin/hermes"
  become: true
  become_user: "{{ item }}"
  environment:
    HOME: "/home/{{ item }}"
    PATH: "/home/{{ item }}/.local/bin:{{ ansible_env.PATH }}"
  loop: "{{ hetzner_hermes_users }}"
  tags: [hermes]

- name: Update Hermes Agent for configured users
  ansible.builtin.command: "/home/{{ item }}/.local/bin/hermes update --yes --no-backup"
  become: true
  become_user: "{{ item }}"
  environment:
    HOME: "/home/{{ item }}"
  loop: "{{ hetzner_hermes_users }}"
  register: hetzner_hermes_update_result
  changed_when: "'Update complete' in hetzner_hermes_update_result.stdout"
  tags: [hermes]

- name: Ensure Hermes config directories exist for configured users
  ansible.builtin.file:
    path: "/home/{{ item }}/.hermes"
    state: directory
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: '0700'
  loop: "{{ hetzner_hermes_users }}"
  tags: [hermes]

- name: Configure bare-metal Hermes environment for configured users
  ansible.builtin.blockinfile:
    path: "/home/{{ item }}/.hermes/.env"
    create: true
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: '0600'
    marker: "# {mark} ANSIBLE MANAGED HERMES ENV"
    block: |
      {% for key, value in (hetzner_hermes_env | default({}) | dictsort) %}
      {{ key }}={{ value }}
      {% endfor %}
  loop: "{{ hetzner_hermes_users }}"
  register: hetzner_hermes_env_file
  when: (hetzner_hermes_env | default({})) | length > 0
  tags: [hermes]

- name: Ensure Hermes user service drop-in directories exist
  ansible.builtin.file:
    path: "/home/{{ item }}/.config/systemd/user/hermes-gateway.service.d"
    state: directory
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: '0755'
  loop: "{{ hetzner_hermes_users }}"
  when: (hetzner_hermes_env | default({})) | length > 0
  tags: [hermes]

- name: Configure Hermes user service to load managed environment file
  ansible.builtin.copy:
    dest: "/home/{{ item }}/.config/systemd/user/hermes-gateway.service.d/10-ansible-env.conf"
    content: |
      [Service]
      EnvironmentFile=%h/.hermes/.env
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: '0644'
  loop: "{{ hetzner_hermes_users }}"
  register: hetzner_hermes_service_env_dropin
  when: (hetzner_hermes_env | default({})) | length > 0
  tags: [hermes]

- name: Configure Hermes dashboard user service
  ansible.builtin.copy:
    dest: "/home/{{ item }}/.config/systemd/user/hermes-dashboard.service"
    content: |
      [Unit]
      Description=Hermes Agent Dashboard
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      EnvironmentFile=%h/.hermes/.env
      ExecStart=/home/{{ item }}/.local/bin/hermes dashboard --host ${HERMES_DASHBOARD_HOST} --port ${HERMES_DASHBOARD_PORT} --no-open --insecure --tui
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=default.target
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: '0644'
  loop: "{{ hetzner_hermes_users }}"
  register: hetzner_hermes_dashboard_service
  when: (hetzner_hermes_env.HERMES_DASHBOARD | default('0') | string) in ['1', 'true', 'True', 'yes', 'on']
  tags: [hermes]

- name: Reload Hermes user systemd manager when environment changed
  ansible.builtin.shell: >-
    XDG_RUNTIME_DIR=/run/user/$(id -u) systemctl --user daemon-reload
  become: true
  become_user: "{{ item }}"
  loop: "{{ hetzner_hermes_users }}"
  changed_when: false
  when:
    - (hetzner_hermes_env | default({})) | length > 0
    - hetzner_hermes_env_file is changed or hetzner_hermes_service_env_dropin is changed or hetzner_hermes_dashboard_service is changed
  tags: [hermes]

- name: Restart Hermes gateway when environment changed
  ansible.builtin.shell: >-
    XDG_RUNTIME_DIR=/run/user/$(id -u) systemctl --user restart hermes-gateway.service
  become: true
  become_user: "{{ item }}"
  loop: "{{ hetzner_hermes_users }}"
  when:
    - (hetzner_hermes_env | default({})) | length > 0
    - hetzner_hermes_env_file is changed or hetzner_hermes_service_env_dropin is changed
  tags: [hermes]

- name: Enable and start Hermes dashboard user service
  ansible.builtin.shell: >-
    XDG_RUNTIME_DIR=/run/user/$(id -u) systemctl --user enable --now hermes-dashboard.service
  become: true
  become_user: "{{ item }}"
  loop: "{{ hetzner_hermes_users }}"
  changed_when: false
  when: (hetzner_hermes_env.HERMES_DASHBOARD | default('0') | string) in ['1', 'true', 'True', 'yes', 'on']
  tags: [hermes]

- name: Restart Hermes dashboard when service environment changed
  ansible.builtin.shell: >-
    XDG_RUNTIME_DIR=/run/user/$(id -u) systemctl --user restart hermes-dashboard.service
  become: true
  become_user: "{{ item }}"
  loop: "{{ hetzner_hermes_users }}"
  when:
    - (hetzner_hermes_env.HERMES_DASHBOARD | default('0') | string) in ['1', 'true', 'True', 'yes', 'on']
    - hetzner_hermes_env_file is changed or hetzner_hermes_dashboard_service is changed
  tags: [hermes]

- name: Check Hermes Agent installation
  ansible.builtin.command: "/home/{{ item }}/.local/bin/hermes --version"
  become: true
  become_user: "{{ item }}"
  environment:
    HOME: "/home/{{ item }}"
  loop: "{{ hetzner_hermes_users }}"
  changed_when: false
  tags: [hermes]
