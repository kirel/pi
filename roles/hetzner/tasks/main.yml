---
- name: Remove legacy NodeSource deb822 repository with conflicting signed-by
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/nodesource.sources
    state: absent
  tags: [node, openclaw]

- name: Install base CLI packages
  ansible.builtin.apt:
    name:
      - zsh
      - tmux
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [homebrew, mise]

- name: Ensure Hetzner users exist with configured shell
  ansible.builtin.user:
    name: "{{ item.name }}"
    shell: "{{ item.shell | default('/usr/bin/zsh') }}"
    create_home: true
    groups: "{{ 'sudo' if item.sudo | default(false) else '' }}"
    append: "{{ item.sudo | default(false) }}"
    state: present
  loop: "{{ hetzner_users }}"
  tags: [homebrew, mise, users, hermes]

- name: Add authorized SSH keys for Hetzner users
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    state: present
    exclusive: false
    manage_dir: true
  loop: "{{ hetzner_users | subelements('authorized_keys', skip_missing=True) }}"
  tags: [users]

- name: Allow configured Hetzner users passwordless sudo
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL) NOPASSWD: ALL\n"
    owner: root
    group: root
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s
  loop: "{{ hetzner_users | selectattr('passwordless_sudo', 'defined') | selectattr('passwordless_sudo') | list }}"
  tags: [homebrew, mise, users]

- name: Remove passwordless sudo for users without it
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ item.name }}"
    state: absent
  loop: "{{ hetzner_users | rejectattr('passwordless_sudo', 'defined') | list + (hetzner_users | selectattr('passwordless_sudo', 'defined') | rejectattr('passwordless_sudo') | list) }}"
  tags: [users]

- name: Ensure Homebrew admin group exists
  ansible.builtin.group:
    name: "{{ hetzner_homebrew_group }}"
    state: present
  tags: [homebrew, mise]

- name: Add configured users to Homebrew admin group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: "{{ hetzner_homebrew_group }}"
    append: true
  loop: "{{ hetzner_homebrew_users }}"
  tags: [homebrew, mise]

- name: Install Linuxbrew prerequisites
  ansible.builtin.apt:
    name:
      - build-essential
      - ca-certificates
      - curl
      - file
      - git
      - procps
      - acl
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [homebrew, mise]

- name: Install Homebrew using the official non-interactive installer
  ansible.builtin.shell: |
    set -o pipefail
    NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  args:
    executable: /bin/bash
    creates: "{{ hetzner_homebrew_prefix }}/bin/brew"
  become: true
  become_user: "{{ hetzner_homebrew_user }}"
  environment:
    HOME: "/home/{{ hetzner_homebrew_user }}"
  tags: [homebrew, mise]

- name: Allow Homebrew admin group to manage Homebrew prefix
  ansible.builtin.file:
    path: "{{ hetzner_homebrew_prefix }}"
    owner: "{{ hetzner_homebrew_user }}"
    group: "{{ hetzner_homebrew_group }}"
    mode: '0775'
    recurse: true
  tags: [homebrew, mise]

- name: Remove setgid bits from Homebrew prefix to keep Ruby happy
  ansible.builtin.command: "find {{ hetzner_homebrew_prefix }} -perm /2000 -exec chmod g-s {} +"
  changed_when: false
  tags: [homebrew, mise]

- name: Set default ACLs so Homebrew admin group can write new files
  ansible.builtin.command: "setfacl -R -m g:{{ hetzner_homebrew_group }}:rwX,d:g:{{ hetzner_homebrew_group }}:rwX {{ hetzner_homebrew_prefix }}"
  changed_when: false
  tags: [homebrew, mise]

- name: Add Homebrew shell environment system-wide for POSIX login shells
  ansible.builtin.copy:
    dest: /etc/profile.d/homebrew.sh
    content: |
      if [ -x {{ hetzner_homebrew_prefix }}/bin/brew ]; then
        eval "$({{ hetzner_homebrew_prefix }}/bin/brew shellenv)"
      fi
    owner: root
    group: root
    mode: '0644'
  tags: [homebrew, mise]

- name: Add Homebrew shell environment to Hetzner user zsh startup files
  ansible.builtin.lineinfile:
    path: "/home/{{ item.0.name }}/{{ item.1 }}"
    line: 'eval "$({{ hetzner_homebrew_prefix }}/bin/brew shellenv)"'
    create: true
    owner: "{{ item.0.name }}"
    group: "{{ item.0.name }}"
    mode: '0644'
  loop: "{{ hetzner_users | product(['.zprofile', '.zshrc']) | list }}"
  tags: [homebrew, mise]

- name: Install Homebrew formulae
  community.general.homebrew:
    name: "{{ hetzner_homebrew_formulae }}"
    state: present
    update_homebrew: true
    path: "{{ hetzner_homebrew_prefix }}/bin"
  become: true
  become_user: "{{ hetzner_homebrew_user }}"
  environment:
    HOME: "/home/{{ hetzner_homebrew_user }}"
    PATH: "{{ hetzner_homebrew_prefix }}/bin:{{ ansible_env.PATH }}"
  tags: [homebrew, mise]

- name: Enable mise in zsh
  ansible.builtin.lineinfile:
    path: "/home/{{ hetzner_homebrew_user }}/.zshrc"
    line: 'eval "$(mise activate zsh)"'
    create: true
    owner: "{{ hetzner_homebrew_user }}"
    group: "{{ hetzner_homebrew_user }}"
    mode: '0644'
  tags: [mise]

- name: Install NodeSource repository prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [node, openclaw]

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [node, openclaw]

- name: Install NodeSource apt signing key
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key \
      | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
  args:
    executable: /bin/bash
    creates: /etc/apt/keyrings/nodesource.gpg
  tags: [node, openclaw]

- name: Add NodeSource Node.js repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/nodesource.gpg]
      https://deb.nodesource.com/node_{{ hetzner_nodejs_major_version }}.x nodistro main
    filename: nodesource
    state: present
    update_cache: true
  tags: [node, openclaw]

- name: Install system Node.js for OpenClaw
  ansible.builtin.apt:
    name: nodejs
    state: present
  tags: [node, openclaw]

- name: Ensure user-local bin is on PATH for Hermes users
  ansible.builtin.lineinfile:
    path: "/home/{{ item }}/.zshrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    create: true
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: '0644'
  loop: "{{ hetzner_hermes_users }}"
  tags: [hermes]

- name: Install Hermes Agent for configured users
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL {{ hetzner_hermes_install_url }} | bash -s -- --skip-setup --skip-browser
  args:
    executable: /bin/bash
    creates: "/home/{{ item }}/.local/bin/hermes"
  become: true
  become_user: "{{ item }}"
  environment:
    HOME: "/home/{{ item }}"
    PATH: "/home/{{ item }}/.local/bin:{{ ansible_env.PATH }}"
  loop: "{{ hetzner_hermes_users }}"
  tags: [hermes]

- name: Update Hermes Agent for configured users
  ansible.builtin.command: "/home/{{ item }}/.local/bin/hermes update --yes --no-backup"
  become: true
  become_user: "{{ item }}"
  environment:
    HOME: "/home/{{ item }}"
  loop: "{{ hetzner_hermes_users }}"
  register: hetzner_hermes_update_result
  changed_when: "'Update complete' in hetzner_hermes_update_result.stdout"
  tags: [hermes]

- name: Check Hermes Agent installation
  ansible.builtin.command: "/home/{{ item }}/.local/bin/hermes --version"
  become: true
  become_user: "{{ item }}"
  environment:
    HOME: "/home/{{ item }}"
  loop: "{{ hetzner_hermes_users }}"
  changed_when: false
  tags: [hermes]
