---
- name: Install baseline server packages
  ansible.builtin.apt:
    name:
      - mosh
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [basic, packages, mosh]

- name: Allow sudo without password prompt
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    line: "%sudo ALL=(ALL) NOPASSWD: ALL"
    validate: visudo -cf %s
- name: Generate locale
  community.general.locale_gen:
    name: "{{ item }}"
    state: present
  with_items: "{{ locales }}"
- name: /etc/default/locale
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/default/locale
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: "{{ item.state }}"
  with_items:
    - { regexp: ^LANG=, line: "LANG={{ locale }}", state: present }
    - { regexp: ^LC_ALL=, line: "LC_ALL={{ locale }}", state: present }
    - { regexp: ^LANGUAGE=, line: "LANGUAGE={{ locale }}", state: present }
  notify:
    - reconfigure locales
- name: Set timezone to Europe/Berlin
  community.general.timezone:
    name: Europe/Berlin
- name: Update journald config file to limit journal size
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: ^SystemMaxUse=
    line: SystemMaxUse=100M
  notify:
    - Restart systemd-journald

- name: Increase UDP receive buffer size for HTTP/3 (QUIC)
  ansible.posix.sysctl:
    name: net.core.rmem_max
    value: "7500000"
    sysctl_set: true
    state: present
    reload: true

- name: Increase UDP send buffer size for HTTP/3 (QUIC)
  ansible.posix.sysctl:
    name: net.core.wmem_max
    value: "7500000"
    sysctl_set: true
    state: present
    reload: true
