---
- name: Validate Hermes Docker prerequisites
  when: hermes_docker_validate_prerequisites | bool
  block:
    - name: Check Docker CLI is available
      ansible.builtin.command: docker --version
      changed_when: false

    - name: Check Docker Compose v2 plugin is available
      ansible.builtin.command: docker compose version
      changed_when: false

- name: Build effective Hermes global environment
  ansible.builtin.set_fact:
    hermes_docker_effective_global_env: >-
      {{
        ({'MINIMAX_API_KEY': MINIMAX_API_KEY} if MINIMAX_API_KEY is defined else {}) |
        combine(({'MINIMAX_API_KEY': minimax_api_key} if minimax_api_key is defined else {}), recursive=True) |
        combine(({'TAVILY_API_KEY': TAVILY_API_KEY} if TAVILY_API_KEY is defined else {}), recursive=True) |
        combine(({'TAVILY_API_KEY': tavily_api_key} if tavily_api_key is defined else {}), recursive=True) |
        combine(hermes_docker_global_env, recursive=True)
      }}
  no_log: true

- name: Validate Hermes Docker agent configuration
  ansible.builtin.assert:
    that:
      - hermes_docker_agents is mapping
      - hermes_docker_agents | length > 0
      - >-
        hermes_docker_agents.keys() | list |
        select('match', '^[A-Za-z0-9][A-Za-z0-9_.-]*$') | list | length == hermes_docker_agents | length
      - >-
        not (hermes_docker_require_minimax_api_key | bool) or
        (hermes_docker_effective_global_env.MINIMAX_API_KEY is defined and
        hermes_docker_effective_global_env.MINIMAX_API_KEY | string | length > 0)
    fail_msg: >-
      Define hermes_docker_agents with valid Docker-safe agent names and provide
      MINIMAX_API_KEY either as a top-level Vault variable or in hermes_docker_global_env.

- name: Create Hermes Docker base directory
  ansible.builtin.file:
    path: "{{ hermes_docker_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Ensure shared external Hermes skills directory exists
  ansible.builtin.file:
    path: "{{ hermes_external_skills_host_dir }}"
    state: directory
    owner: "{{ hermes_external_skills_host_owner }}"
    group: "{{ hermes_external_skills_host_group }}"
    mode: '0755'

- name: Ensure shared external Hermes skills ownership is readable by containers
  ansible.builtin.command:
    argv:
      - chown
      - -R
      - "{{ hermes_external_skills_host_owner }}:{{ hermes_external_skills_host_group }}"
      - "{{ hermes_external_skills_host_dir }}"
  changed_when: false

- name: Ensure shared external Hermes skill directories are traversable
  ansible.builtin.command: "find {{ hermes_external_skills_host_dir | quote }} -type d -exec chmod 755 {} +"
  changed_when: false

- name: Ensure shared external Hermes skill files are world-readable
  ansible.builtin.command: "find {{ hermes_external_skills_host_dir | quote }} -type f -exec chmod 644 {} +"
  changed_when: false

- name: Create per-agent parent directories
  ansible.builtin.file:
    path: "{{ hermes_docker_base_dir }}/{{ agent.key }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop: "{{ hermes_docker_agents | dict2items }}"
  loop_control:
    loop_var: agent
    label: "{{ agent.key }}"

- name: Create isolated per-agent data directories
  ansible.builtin.file:
    path: "{{ hermes_docker_base_dir }}/{{ agent.key }}/data"
    state: directory
    owner: "{{ hermes_docker_data_uid }}"
    group: "{{ hermes_docker_data_gid }}"
    mode: '0750'
  loop: "{{ hermes_docker_agents | dict2items }}"
  loop_control:
    loop_var: agent
    label: "{{ agent.key }}"

- name: Render per-agent Hermes env files
  ansible.builtin.template:
    src: agent.env.j2
    dest: "{{ hermes_docker_base_dir }}/{{ agent.key }}/data/.env"
    owner: "{{ hermes_docker_data_uid }}"
    group: "{{ hermes_docker_data_gid }}"
    mode: '0600'
  loop: "{{ hermes_docker_agents | dict2items }}"
  loop_control:
    loop_var: agent
    label: "{{ agent.key }}"
  no_log: true
  notify: Recreate Hermes Docker agents

- name: Render Hermes Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ hermes_docker_base_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: '0644'
  notify: Recreate Hermes Docker agents

- name: Apply pending Hermes Docker Compose changes
  ansible.builtin.meta: flush_handlers

- name: Ensure Hermes Docker Compose stack is running
  community.docker.docker_compose_v2:
    project_src: "{{ hermes_docker_base_dir }}"
    files:
      - docker-compose.yml
    project_name: "{{ hermes_docker_project_name }}"
    state: present
    pull: "{{ hermes_docker_compose_pull }}"
    remove_orphans: true
  when: hermes_docker_ensure_running | bool

- name: Configure shared external skills path in Hermes agents
  ansible.builtin.shell: |
    set -o pipefail
    docker exec --user hermes --env HERMES_HOME={{ hermes_container_data_dir }} hermes-{{ agent.key }} sh -lc '
      grep -q "^[[:space:]]*- {{ hermes_external_skills_config_path | regex_escape }}$" {{ hermes_container_data_dir }}/config.yaml \
        || /opt/hermes/.venv/bin/hermes config set skills.external_dirs "{{ hermes_external_skills_config_path }}"
    '
  args:
    executable: /bin/bash
  loop: "{{ hermes_docker_agents | dict2items }}"
  loop_control:
    loop_var: agent
    label: "{{ agent.key }}"
  register: hermes_external_skills_config_set
  changed_when: "'Set skills.external_dirs' in hermes_external_skills_config_set.stdout"
  when: hermes_docker_ensure_running | bool

- name: Normalize Hermes external skills config to a YAML list
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - --user
      - hermes
      - --env
      - HERMES_HOME={{ hermes_container_data_dir }}
      - hermes-{{ agent.key }}
      - /opt/hermes/.venv/bin/python
      - -c
      - |
        import os
        from pathlib import Path
        import yaml

        path = Path(os.environ.get('HERMES_HOME', '{{ hermes_container_data_dir }}')) / 'config.yaml'
        config = yaml.safe_load(path.read_text()) if path.exists() else {}
        if not isinstance(config, dict):
            config = {}
        skills = config.setdefault('skills', {})
        target = '{{ hermes_external_skills_config_path }}'
        skills['external_dirs'] = [target]
        path.write_text(yaml.safe_dump(config, sort_keys=False))
  loop: "{{ hermes_docker_agents | dict2items }}"
  loop_control:
    loop_var: agent
    label: "{{ agent.key }}"
  changed_when: false
  when: hermes_docker_ensure_running | bool
