---
- name: Validate Hermes Docker prerequisites
  when: hermes_docker_validate_prerequisites | bool
  block:
    - name: Check Docker CLI is available
      ansible.builtin.command: docker --version
      changed_when: false

    - name: Check Docker Compose v2 plugin is available
      ansible.builtin.command: docker compose version
      changed_when: false

    - name: Check Git CLI is available
      ansible.builtin.command: git --version
      changed_when: false

- name: Build effective Hermes environment and agent maps
  ansible.builtin.set_fact:
    hermes_docker_effective_global_env: >-
      {{
        hermes_docker_global_env |
        combine(hermes_docker_global_env_secret, recursive=True)
      }}
    hermes_docker_effective_agent_names: >-
      {{
        (
          (hermes_docker_agent_order | default([])) +
          (hermes_docker_agents_env.keys() | list) +
          (hermes_docker_agents_env_secret.keys() | list)
        ) | unique
      }}
    hermes_docker_external_skill_host_dirs: >-
      {{
        hermes_docker_agents_external_skill_dirs |
        dict2items |
        map(attribute='value') |
        flatten |
        map(attribute='host_dir') |
        unique
      }}
  no_log: true

- name: Validate Hermes extra_hosts service names
  ansible.builtin.assert:
    that:
      - item in services
      - services[item].domain is defined
    fail_msg: "Hermes extra_hosts service '{{ item }}' must exist in services and define a domain."
  loop: "{{ hermes_docker_extra_host_services }}"
  when: hermes_docker_isolate_agents | bool

- name: Validate per-agent Hermes extra_hosts configuration
  ansible.builtin.assert:
    that:
      - agent_name in hermes_docker_effective_agent_names
      - service_name in services
      - services[service_name].domain is defined
    fail_msg: >-
      Hermes per-agent extra_hosts entry '{{ agent_name }}:{{ service_name }}'
      must reference an existing Hermes agent and a service with a domain.
  vars:
    agent_name: "{{ item.0.key }}"
    service_name: "{{ item.1 }}"
  loop: "{{ hermes_docker_agent_extra_host_services | dict2items | subelements('value') }}"
  when: hermes_docker_isolate_agents | bool

- name: Build per-agent Hermes Docker network map
  ansible.builtin.set_fact:
    hermes_docker_agent_networks: >-
      {%- set networks = {} -%}
      {%- for agent_name in hermes_docker_effective_agent_names -%}
        {%- set octet = hermes_docker_network_base_octet | int + loop.index0 -%}
        {%- set _ = networks.update({
          agent_name: {
            'name': hermes_docker_network_name ~ '-' ~ agent_name,
            'subnet': hermes_docker_network_prefix ~ '.' ~ octet ~ '.0/' ~ hermes_docker_network_cidr_suffix
          }
        }) -%}
      {%- endfor -%}
      {{ networks }}
  when: hermes_docker_isolate_agents | bool

- name: Reset Hermes Docker extra_hosts list
  ansible.builtin.set_fact:
    hermes_docker_extra_hosts: []
  when: hermes_docker_isolate_agents | bool

- name: Build Hermes Docker extra_hosts entries
  ansible.builtin.set_fact:
    hermes_docker_extra_hosts: >-
      {{
        hermes_docker_extra_hosts +
        [services[item].domain ~ ':' ~ hermes_docker_extra_hosts_target_ip]
      }}
  loop: "{{ hermes_docker_extra_host_services }}"
  when: hermes_docker_isolate_agents | bool

- name: Build per-agent Hermes Docker extra_hosts map
  ansible.builtin.set_fact:
    hermes_docker_agent_extra_hosts: >-
      {%- set agent_hosts = {} -%}
      {%- for agent_name in hermes_docker_effective_agent_names -%}
        {%- set entries = hermes_docker_extra_hosts | list -%}
        {%- for service_name in hermes_docker_agent_extra_host_services.get(agent_name, []) -%}
          {%- set _ = entries.append(services[service_name].domain ~ ':' ~ hermes_docker_extra_hosts_target_ip) -%}
        {%- endfor -%}
        {%- set _ = agent_hosts.update({agent_name: entries | unique}) -%}
      {%- endfor -%}
      {{ agent_hosts }}
  when: hermes_docker_isolate_agents | bool

- name: Validate Hermes Docker agent configuration
  ansible.builtin.assert:
    that:
      - hermes_docker_agents_env is mapping
      - hermes_docker_agents_env_secret is mapping
      - hermes_docker_agents_config_overrides is mapping
      - hermes_docker_managed_mcp_servers is mapping
      - hermes_docker_agents_external_skill_dirs is mapping
      - hermes_docker_effective_agent_names | length > 0
      - >-
        hermes_docker_effective_agent_names |
        select('match', '^[A-Za-z0-9][A-Za-z0-9_.-]*$') | list | length == hermes_docker_effective_agent_names | length
      - >-
        not (hermes_docker_require_minimax_api_key | bool) or
        (hermes_docker_effective_global_env.MINIMAX_API_KEY is defined and
        hermes_docker_effective_global_env.MINIMAX_API_KEY | string | length > 0)
      - >-
        not (hermes_docker_tailscale_enabled | bool) or
        (hermes_docker_tailscale_authkey is defined and
        hermes_docker_tailscale_authkey | string | length > 0)
    fail_msg: >-
      Define Hermes Docker agents with valid Docker-safe agent names, valid
      per-agent external skill directories, provide MINIMAX_API_KEY in
      hermes_docker_global_env or hermes_docker_global_env_secret, and provide
      hermes_docker_tailscale_authkey when Tailscale sidecars are enabled.

- name: Validate Hermes Docker LiteLLM key configuration
  ansible.builtin.assert:
    that:
      - hermes_docker_litellm_team is mapping
      - hermes_docker_litellm_keys is mapping
      - hermes_docker_litellm_team.team_id is defined
      - hermes_docker_litellm_team.team_id | string | length > 0
      - >-
        (hermes_docker_litellm_keys.keys() | list |
        difference(hermes_docker_effective_agent_names)) | length == 0
      - >-
        (hermes_docker_litellm_keys | dict2items |
        map(attribute='value.key_alias') |
        select('defined') |
        list |
        unique |
        length) ==
        (hermes_docker_litellm_keys | dict2items |
        map(attribute='value.key_alias') |
        select('defined') |
        list |
        length)
      - litellm_master_key is defined
      - litellm_master_key | string | length > 0
    fail_msg: >-
      hermes_docker_litellm_team must define team_id, hermes_docker_litellm_keys
      must be a map of effective Hermes agent names with unique key_alias values,
      and litellm_master_key must be available.
  when: hermes_docker_litellm_manage_keys | bool

- name: Validate per-agent Hermes Docker LiteLLM key entries
  ansible.builtin.assert:
    that:
      - item.value is mapping
      - item.value.models is defined
      - item.value.models is sequence
      - item.value.models is not string
      - item.value.mcp_access_groups is defined
      - item.value.mcp_access_groups is sequence
      - item.value.mcp_access_groups is not string
      - hermes_docker_agents_env_secret[item.key].LITELLM_API_KEY is defined
      - hermes_docker_agents_env_secret[item.key].LITELLM_API_KEY | string is match('^sk-.+')
    fail_msg: >-
      Managed Hermes LiteLLM key '{{ item.key }}' must define list values for
      models and mcp_access_groups and have LITELLM_API_KEY in
      hermes_docker_agents_env_secret.
  loop: "{{ hermes_docker_litellm_keys | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  no_log: true
  when: hermes_docker_litellm_manage_keys | bool

- name: Sync Hermes Docker LiteLLM keys
  ansible.builtin.include_tasks: litellm_keys.yml
  when: hermes_docker_litellm_manage_keys | bool

- name: Create Hermes Docker base directory
  ansible.builtin.file:
    path: "{{ hermes_docker_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Ensure external Hermes skills repository parent directory exists
  ansible.builtin.file:
    path: "{{ hermes_external_skills_repo_dest | dirname }}"
    state: directory
    owner: "{{ hermes_external_skills_host_owner }}"
    group: "{{ hermes_external_skills_host_group }}"
    mode: '0755'

- name: Check external Hermes skills repository exists
  ansible.builtin.stat:
    path: "{{ hermes_external_skills_repo_dest }}/.git"
  register: hermes_external_skills_repo_git

- name: Check external Hermes skills repository status
  ansible.builtin.command: git status --porcelain
  args:
    chdir: "{{ hermes_external_skills_repo_dest }}"
  become: true
  become_user: "{{ hermes_external_skills_host_owner }}"
  register: hermes_external_skills_repo_status
  changed_when: false
  when: hermes_external_skills_repo_git.stat.exists

- name: Clone external Hermes skills repository
  ansible.builtin.git:
    repo: "{{ hermes_external_skills_repo_url }}"
    dest: "{{ hermes_external_skills_repo_dest }}"
    version: "{{ hermes_external_skills_repo_version }}"
    update: true
  become: true
  become_user: "{{ hermes_external_skills_host_owner }}"
  when: not hermes_external_skills_repo_git.stat.exists

- name: Update external Hermes skills repository when clean
  ansible.builtin.git:
    repo: "{{ hermes_external_skills_repo_url }}"
    dest: "{{ hermes_external_skills_repo_dest }}"
    version: "{{ hermes_external_skills_repo_version }}"
    update: true
  become: true
  become_user: "{{ hermes_external_skills_host_owner }}"
  when:
    - hermes_external_skills_repo_git.stat.exists
    - hermes_external_skills_repo_status.stdout | length == 0

- name: Warn when external Hermes skills repository has local changes
  ansible.builtin.debug:
    msg: >-
      Skipping Hermes skills repo update because local modifications exist in
      {{ hermes_external_skills_repo_dest }}.
  when:
    - hermes_external_skills_repo_git.stat.exists
    - hermes_external_skills_repo_status.stdout | length > 0

- name: Check external Hermes skill directories
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ hermes_docker_external_skill_host_dirs }}"
  register: hermes_docker_external_skill_dir_stats

- name: Validate external Hermes skill directories exist
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.isdir
    fail_msg: "External Hermes skill directory is missing or not a directory: {{ item.item }}"
  loop: "{{ hermes_docker_external_skill_dir_stats.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Ensure external Hermes skills ownership is readable by containers
  ansible.builtin.command:
    argv:
      - chown
      - -R
      - "{{ hermes_external_skills_host_owner }}:{{ hermes_external_skills_host_group }}"
      - "{{ item }}"
  changed_when: false
  loop: "{{ hermes_docker_external_skill_host_dirs }}"

- name: Ensure external Hermes skill directories are traversable
  ansible.builtin.command: "find {{ item | quote }} -type d -exec chmod 755 {} +"
  changed_when: false
  loop: "{{ hermes_docker_external_skill_host_dirs }}"

- name: Ensure external Hermes skill files are world-readable
  ansible.builtin.command: "find {{ item | quote }} -type f -exec chmod 644 {} +"
  changed_when: false
  loop: "{{ hermes_docker_external_skill_host_dirs }}"

- name: Create per-agent parent directories
  ansible.builtin.file:
    path: "{{ hermes_docker_base_dir }}/{{ agent_name }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop: "{{ hermes_docker_effective_agent_names }}"
  loop_control:
    loop_var: agent_name
    label: "{{ agent_name }}"

- name: Create isolated per-agent data directories
  ansible.builtin.file:
    path: "{{ hermes_docker_base_dir }}/{{ agent_name }}/data"
    state: directory
    owner: "{{ hermes_docker_data_uid }}"
    group: "{{ hermes_docker_data_gid }}"
    mode: '0700'
  loop: "{{ hermes_docker_effective_agent_names }}"
  loop_control:
    loop_var: agent_name
    label: "{{ agent_name }}"

- name: Create per-agent Tailscale state directories
  ansible.builtin.file:
    path: "{{ hermes_docker_base_dir }}/{{ agent_name }}/tailscale"
    state: directory
    owner: root
    group: root
    mode: '0700'
  loop: "{{ hermes_docker_effective_agent_names }}"
  loop_control:
    loop_var: agent_name
    label: "{{ agent_name }}"
  when: hermes_docker_tailscale_enabled | bool

- name: Render per-agent Tailscale env files
  ansible.builtin.template:
    src: tailscale.env.j2
    dest: "{{ hermes_docker_base_dir }}/{{ agent_name }}/tailscale.env"
    owner: root
    group: root
    mode: '0600'
  loop: "{{ hermes_docker_effective_agent_names }}"
  loop_control:
    loop_var: agent_name
    label: "{{ agent_name }}"
  no_log: true
  notify: Recreate Hermes Docker agents
  when: hermes_docker_tailscale_enabled | bool

- name: Render per-agent Hermes env files
  ansible.builtin.template:
    src: agent.env.j2
    dest: "{{ hermes_docker_base_dir }}/{{ agent_name }}/data/.env"
    owner: "{{ hermes_docker_data_uid }}"
    group: "{{ hermes_docker_data_gid }}"
    mode: '0600'
  loop: "{{ hermes_docker_effective_agent_names }}"
  loop_control:
    loop_var: agent_name
    label: "{{ agent_name }}"
  no_log: true
  notify: Recreate Hermes Docker agents

- name: Render Hermes Docker firewall script
  ansible.builtin.template:
    src: hermes-docker-firewall.sh.j2
    dest: "{{ hermes_docker_firewall_script_path }}"
    owner: root
    group: root
    mode: '0755'
  when: hermes_docker_isolate_agents | bool

- name: Render Hermes Docker firewall systemd service
  ansible.builtin.template:
    src: hermes-docker-firewall.service.j2
    dest: "/etc/systemd/system/{{ hermes_docker_firewall_service_name }}"
    owner: root
    group: root
    mode: '0644'
  when: hermes_docker_isolate_agents | bool
  register: hermes_docker_firewall_service

- name: Reload systemd when Hermes Docker firewall service changes
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - hermes_docker_isolate_agents | bool
    - hermes_docker_firewall_service is changed

- name: Enable and apply Hermes Docker firewall
  ansible.builtin.systemd:
    name: "{{ hermes_docker_firewall_service_name }}"
    enabled: true
    state: restarted
  when: hermes_docker_isolate_agents | bool

- name: Render Hermes Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ hermes_docker_base_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: '0644'
  notify: Recreate Hermes Docker agents

- name: Apply pending Hermes Docker Compose changes
  ansible.builtin.meta: flush_handlers

- name: Ensure Hermes Docker Compose stack is running
  community.docker.docker_compose_v2:
    project_src: "{{ hermes_docker_base_dir }}"
    files:
      - docker-compose.yml
    project_name: "{{ hermes_docker_project_name }}"
    state: present
    pull: "{{ hermes_docker_compose_pull }}"
    remove_orphans: true
  when: hermes_docker_ensure_running | bool

- name: Apply Hermes config overrides
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - --user
      - hermes
      - --env
      - HERMES_HOME={{ hermes_container_data_dir }}
      - hermes-{{ agent_name }}
      - /opt/hermes/.venv/bin/python
      - -c
      - |
        import copy
        import json
        import os
        import sys
        from pathlib import Path

        import yaml

        def merge(base, override):
            for key, value in override.items():
                if isinstance(value, dict) and isinstance(base.get(key), dict):
                    merge(base[key], value)
                else:
                    base[key] = value
            return base

        path = Path(os.environ.get('HERMES_HOME', '{{ hermes_container_data_dir }}')) / 'config.yaml'
        config = yaml.safe_load(path.read_text()) if path.exists() else {}
        if not isinstance(config, dict):
            config = {}
        updated = merge(copy.deepcopy(config), json.loads(sys.argv[1]))
        if updated != config:
            path.write_text(yaml.safe_dump(updated, sort_keys=False))
            print('changed')
        else:
            print('ok')
      - "{{ (hermes_docker_config_overrides | combine(hermes_docker_agents_config_overrides.get(agent_name, {}), recursive=True)) | to_json }}"
  loop: "{{ hermes_docker_effective_agent_names }}"
  loop_control:
    loop_var: agent_name
    label: "{{ agent_name }}"
  register: hermes_docker_config_apply
  changed_when: "'changed' in hermes_docker_config_apply.stdout"
  notify: Recreate Hermes Docker agents
  no_log: true
  when:
    - hermes_docker_ensure_running | bool
    - >-
      (hermes_docker_config_overrides | length > 0) or
      (hermes_docker_agents_config_overrides.get(agent_name, {}) | length > 0)

- name: Apply managed Hermes MCP servers
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - --user
      - hermes
      - --env
      - HERMES_HOME={{ hermes_container_data_dir }}
      - hermes-{{ agent_name }}
      - /opt/hermes/.venv/bin/python
      - -c
      - |
        import json
        import os
        import sys
        from pathlib import Path

        import yaml

        path = Path(os.environ.get('HERMES_HOME', '{{ hermes_container_data_dir }}')) / 'config.yaml'
        config = yaml.safe_load(path.read_text()) if path.exists() else {}
        if not isinstance(config, dict):
            config = {}

        managed_servers = json.loads(sys.argv[1])
        servers = config.setdefault('mcp_servers', {})
        if not isinstance(servers, dict):
            servers = {}
            config['mcp_servers'] = servers

        changed = False
        for name, desired in managed_servers.items():
            if servers.get(name) != desired:
                servers[name] = desired
                changed = True

        if changed:
            path.write_text(yaml.safe_dump(config, sort_keys=False))
            print('changed')
        else:
            print('ok')
      - "{{ hermes_docker_managed_mcp_servers | to_json }}"
  loop: >-
    {{
      (
        (hermes_docker_agent_order | default([])) +
        (hermes_docker_agents_env.keys() | list) +
        (hermes_docker_agents_env_secret.keys() | list)
      ) | unique
    }}
  loop_control:
    loop_var: agent_name
    label: "{{ agent_name }}"
  register: hermes_docker_managed_mcp_apply
  changed_when: "'changed' in hermes_docker_managed_mcp_apply.stdout"
  notify: Recreate Hermes Docker agents
  no_log: true
  when:
    - hermes_docker_ensure_running | bool
    - hermes_docker_managed_mcp_servers | length > 0
