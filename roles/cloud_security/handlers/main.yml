---
- name: Reload ssh
  ansible.builtin.service:
    name: ssh
    state: reloaded

- name: Apply sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted

- name: Restart cloud security Docker firewall
  ansible.builtin.systemd:
    name: cloud-security-docker-user-firewall.service
    state: restarted
    daemon_reload: true
  when: cloud_security_docker_user_firewall_enabled | bool
