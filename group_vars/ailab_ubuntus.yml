---
ipv6_config: enable
disable_wifi: true
disable_bluetooth: true

# Override config_root specifically for ailab
config_root: /home/{{ username_personal }}/config

# comfyui specific vars
comfyui_storage_path: /home/{{ username_personal }}/comfyui/storage # Specific path for ailab host in user home

# Wan2GP specific vars
wan2gp_base_dir: /home/{{ username_personal }}/wan2gp

# GPU performance and stability
# Clear stale prebuilt NVIDIA kernel-module packages (leftover 580 branches
# for removed kernels); the live driver is DKMS-built from the pinned 610.
nvidia_cleanup_legacy_kernel_modules: true
gpu_persistence_mode: true
gpu_configs:
  - uuid: "{{ gpu_3090_0_uuid }}"
    power_limit: 250
  - uuid: "{{ gpu_3090_1_uuid }}"
    power_limit: 250
  - uuid: "{{ gpu_5060ti_uuid }}"
    power_limit: 180
