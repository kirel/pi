---
# Hetzner VPS is a Tailnet client: consume homelab split DNS and subnet routes,
# but do not advertise any routes of its own.
tailscale_args: "--accept-dns=true --accept-routes=true --operator=daniel"

cloud_security_users: "{{ hetzner_users }}"
cloud_security_ssh_permit_root_login: "no"
cloud_security_ssh_password_authentication: "no"
cloud_security_ssh_kbd_interactive_authentication: "no"
cloud_security_docker_user_firewall_enabled: true

# Expose dockerproxy only on the Hetzner Tailnet IP, never on the public VPS interface.
dockerproxy_bind_address: "{{ ansible_host }}"
hermes_docker_base_image: nousresearch/hermes-agent:main
hermes_docker_agent_order:
  - multipurpose
  - marian
  - anna
hermes_docker_agent_tailnet_ips:
  multipurpose: 100.88.41.45
  marian: 100.86.181.83
  anna: 100.115.175.58
hermes_docker_agent_extra_host_services:
  multipurpose:
    - homeassistant
hermes_docker_agents_env:
  multipurpose:
    API_SERVER_ENABLED: "true"
    API_SERVER_HOST: "0.0.0.0"
    API_SERVER_PORT: "8642"
    API_SERVER_MODEL_NAME: hermes-multipurpose
hermes_docker_litellm_manage_keys: true
hermes_docker_litellm_team:
  team_id: hermes-docker
  team_alias: Hermes Docker
  models:
    - home-fast
    - home-smart
  object_permission:
    mcp_access_groups:
      - family
      - global
hermes_docker_litellm_keys:
  multipurpose:
    key_alias: hermes-multipurpose
    models:
      - home-fast
      - home-smart
    mcp_access_groups:
      - family
      - global
  marian:
    key_alias: hermes-marian
    models:
      - home-fast
      - home-smart
    mcp_access_groups:
      - global
  anna:
    key_alias: hermes-anna
    models:
      - home-fast
      - home-smart
    mcp_access_groups:
      - global
hermes_docker_agents_external_skill_dirs:
  multipurpose:
    - host_dir: /home/daniel/projects/agent-skills/skills/global
      container_dir: /skills/global
    - host_dir: /home/daniel/projects/agent-skills/skills/family
      container_dir: /skills/family
  anna:
    - host_dir: /home/daniel/projects/agent-skills/skills/global
      container_dir: /skills/global
    - host_dir: /home/daniel/projects/agent-skills/skills/friends
      container_dir: /skills/friends
  marian:
    - host_dir: /home/daniel/projects/agent-skills/skills/global
      container_dir: /skills/global
    - host_dir: /home/daniel/projects/agent-skills/skills/friends
      container_dir: /skills/friends
hermes_docker_agents_config_overrides:
  multipurpose:
    model:
      default: MiniMax-M3
      provider: minimax
    skills:
      external_dirs:
        - /skills/global
        - /skills/family
        - /skills/caddy-proxy
  anna:
    model:
      default: MiniMax-M3
      provider: minimax
    skills:
      external_dirs:
        - /skills/global
        - /skills/friends
        - /skills/caddy-proxy
  marian:
    skills:
      external_dirs:
        - /skills/global
        - /skills/friends
        - /skills/caddy-proxy

hetzner_users:
  - name: daniel
    shell: /usr/bin/zsh
    sudo: true
    passwordless_sudo: true
    authorized_keys: "{{ hetzner_daniel_authorized_keys }}"

hetzner_hermes_users:
  - daniel
hetzner_hermes_install_url: https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh
hetzner_hermes_env:
  HERMES_DASHBOARD: "1"
  HERMES_DASHBOARD_HOST: "{{ ansible_host }}"
  HERMES_DASHBOARD_PORT: "9119"
  HERMES_DASHBOARD_TUI: "1"

hetzner_homebrew_user: daniel
hetzner_homebrew_group: linuxbrew
hetzner_homebrew_users:
  - daniel
hetzner_homebrew_prefix: /home/linuxbrew/.linuxbrew
hetzner_homebrew_formulae:
  - mise

# System Node.js for OpenClaw. Keep this outside mise so non-interactive
# sessions and service accounts get a stable, predictable node binary.
nodesource_nodejs_major_version: 22
nodesource_nodejs_npm_prefix_user: daniel
nodesource_nodejs_npm_prefix: /home/daniel/.local

hetzner_daniel_authorized_keys:
  # Local public key from the Ansible control machine.
  - "{{ lookup('ansible.builtin.file', lookup('ansible.builtin.env', 'HOME') + '/.ssh/id_rsa.pub') }}"
  # OpenClaw public key.
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGOtmOfi47EnpdA/9ciKYhLI2b9+aGCWby3aRWgRb5D7 shrimp-openclaw@github.com"
