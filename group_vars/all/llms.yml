llamaswap_enabled: true

model_group_alias:
  home: "Qwen3.6-35B-A3B-Instruct-nothink"
  home-fast: "Qwen3.6-35B-A3B-Instruct-nothink"
  home-smart: "Qwen3.6-35B-A3B-Instruct"
  home-vision: "Qwen3.6-35B-A3B-Instruct"
  home-ha: "Qwen3.6-27B-Instruct"
  home-hermes: "Qwen3.6-27B-Instruct"
  home-embed: "qwen3-embedding"
  home-remote: "google/gemini-3-flash-preview"

# llama.cpp --fit is not implemented for tensor split mode. Keep the total KV
# pools explicit so qwen3-embedding, Speaches, and qwen3-tts can stay resident
# with at least the existing GPU headroom. Unified KV lets three concurrent
# sequences share each pool instead of dividing it into equal per-slot contexts.
llama_parallel_slots: 3
llama_prompt_cache_ram_mib: 8192
llama_native_context_qwen36: 262144
llama_native_context_gemma4: 262144
# The dense 27B has a substantially larger KV footprint per token. The 35B
# uses the same conservative pool so GPU1 keeps its reserve after TTS JIT.
llama_ctx_size_qwen35_3090: 376832
llama_ctx_size_qwen27_3090: 376832
llama_ctx_size_gemma4_26b_3090: 376832
# The dense 31B plus its MTP/mmproj only preserves the required resident-service
# headroom at 128K. 262K leaves GPU0 effectively full; 376832 fails to start.
llama_ctx_size_gemma4_31b_3090: 131072
llama_n_predict_3090: 32768

litellm_fallbacks:
  - home: ["home-remote"]
  - home-fast: ["home-remote"]
  - home-smart: ["home-remote"]

openrouter_models:
  - openai/gpt-5.5
  - anthropic/claude-haiku-4.5
  - anthropic/claude-sonnet-4.6
  - anthropic/claude-opus-4.8
  - deepseek/deepseek-v4-flash
  - deepseek/deepseek-v4-pro
  - google/gemini-3.5-flash
  - google/gemini-3.1-flash-lite

litellm_extra_models:
  - model_name: minimax-m3
    litellm_params:
      model: minimax/MiniMax-M3
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/v1
    # MiniMax-M3 is a reasoning-capable multimodal model (per pi-ai catalog);
    # declare capabilities so LiteLLM reports them via /model/info and clients
    # like pi-provider-litellm enable thinking/vision instead of falling back
    # to supports_reasoning=false on /v1/models-only discovery.
    model_info:
      supports_reasoning: true
      supports_vision: true

  - model_name: glm-5.2
    litellm_params:
      model: openai/glm-5.2
      api_key: os.environ/ZAI_API_KEY
      api_base: https://api.z.ai/api/coding/paas/v4
    # GLM-5.2 supports extended thinking (zai thinkingFormat); LiteLLM's
    # /v1/models fallback doesn't expose supports_reasoning, so declare it
    # here. The zai compat/thinkingFormat is matched by pi via the catalog id.
    model_info:
      supports_reasoning: true

llamaswap_models:
  # Keep public model IDs stable once exposed via LiteLLM/LlamaSwap.
  # Existing aliases are mixed-case because clients may already depend on them.
  # For new entries, prefer the upstream model family name plus a backend suffix
  # only when we expose multiple runtimes of the same base model.

  - alias: Qwen3.6-35B-A3B-Instruct
    # Keep the proven total KV budget, but share it dynamically across three
    # concurrent sequences. Idle histories are moved to the host prompt cache
    # and selected automatically by prefix similarity.
    cmd: >-
      /app/llama-server
      -hf unsloth/Qwen3.6-35B-A3B-MTP-GGUF:UD-Q4_K_XL
      --port ${PORT}
      --ctx-size {{ llama_ctx_size_qwen35_3090 }}
      --parallel {{ llama_parallel_slots }}
      --kv-unified
      --cache-ram {{ llama_prompt_cache_ram_mib }}
      --cache-idle-slots
      --n-predict {{ llama_n_predict_3090 }}
      --n-gpu-layers 99
      -sm tensor
      --fit off
      -fa on
      --cache-type-k q4_0
      --cache-type-v q4_0
      --temp 1.0
      --top-p 0.95
      --top-k 20
      --min-p 0.0
      --presence-penalty 1.5
      --spec-type draft-mtp
      --spec-draft-n-max 2
      --chat-template-kwargs '{"preserve_thinking": true}'
      --jinja
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    context_window: "{{ llama_native_context_qwen36 }}"
    max_input_tokens: "{{ llama_native_context_qwen36 }}"
    max_output_tokens: "{{ llama_n_predict_3090 }}"
    allowed_openai_params:
      - extra_body
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{gpu_3090_0_uuid}},{{gpu_3090_1_uuid}}"
    variants:
      nothink:
        temperature: 0.7
        top_p: 0.8
        extra_body:
          cache_prompt: true
          chat_template_kwargs:
            enable_thinking: false

  - alias: Qwen3.6-27B-Instruct
    # Use the same dynamic three-sequence layout and total KV budget as the 35B
    # model. The smaller Q3 weights offset this dense model's larger KV cache.
    cmd: >-
      /app/llama-server
      -hf unsloth/Qwen3.6-27B-MTP-GGUF:UD-Q3_K_XL
      --port ${PORT}
      --ctx-size {{ llama_ctx_size_qwen27_3090 }}
      --parallel {{ llama_parallel_slots }}
      --kv-unified
      --cache-ram {{ llama_prompt_cache_ram_mib }}
      --cache-idle-slots
      --n-predict {{ llama_n_predict_3090 }}
      --n-gpu-layers 99
      -sm tensor
      --fit off
      -fa on
      --cache-type-k q4_0
      --cache-type-v q4_0
      --temp 1.0
      --top-p 0.95
      --top-k 20
      --min-p 0.0
      --presence-penalty 1.5
      --spec-type draft-mtp
      --spec-draft-n-max 2
      --chat-template-kwargs '{"preserve_thinking": true}'
      --jinja
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    context_window: "{{ llama_native_context_qwen36 }}"
    max_input_tokens: "{{ llama_native_context_qwen36 }}"
    max_output_tokens: "{{ llama_n_predict_3090 }}"
    allowed_openai_params:
      - extra_body
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{gpu_3090_0_uuid}},{{gpu_3090_1_uuid}}"
    variants:
      nothink:
        temperature: 0.7
        top_p: 0.8
        extra_body:
          cache_prompt: true
          chat_template_kwargs:
            enable_thinking: false
  - alias: Gemma-4-26B-A4B-it-qat
    # Gemma 4 QAT uses one recommended GGUF quant (UD-Q4_K_XL). The same
    # Hugging Face repo includes mtp-* GGUFs, and current llama.cpp enables
    # Gemma MTP from -hf plus --spec-type draft-mtp without a separate draft HF.
    cmd: >-
      /app/llama-server
      -hf unsloth/gemma-4-26B-A4B-it-qat-GGUF:UD-Q4_K_XL
      --port ${PORT}
      --ctx-size {{ llama_ctx_size_gemma4_26b_3090 }}
      --parallel {{ llama_parallel_slots }}
      --kv-unified
      --cache-ram {{ llama_prompt_cache_ram_mib }}
      --cache-idle-slots
      --n-predict {{ llama_n_predict_3090 }}
      --n-gpu-layers 99
      -sm tensor
      --fit off
      -fa on
      --cache-type-k q4_0
      --cache-type-v q4_0
      --temp 1.0
      --top-p 0.95
      --top-k 64
      --spec-type draft-mtp
      --spec-draft-n-max 4
      --reasoning on
      --jinja
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    context_window: "{{ llama_native_context_gemma4 }}"
    max_input_tokens: "{{ llama_native_context_gemma4 }}"
    max_output_tokens: "{{ llama_n_predict_3090 }}"
    allowed_openai_params:
      - extra_body
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{gpu_3090_0_uuid}},{{gpu_3090_1_uuid}}"
    variants:
      nothink:
        temperature: 1.0
        top_p: 0.95
        extra_body:
          cache_prompt: true
          chat_template_kwargs:
            enable_thinking: false

  - alias: Gemma-4-31B-it-qat
    # Gemma 4 QAT 31B with same-repo mtp-* GGUF auto-loaded by llama.cpp
    # from -hf plus --spec-type draft-mtp.
    cmd: >-
      /app/llama-server
      -hf unsloth/gemma-4-31B-it-qat-GGUF:UD-Q4_K_XL
      --port ${PORT}
      --ctx-size {{ llama_ctx_size_gemma4_31b_3090 }}
      --parallel {{ llama_parallel_slots }}
      --kv-unified
      --cache-ram {{ llama_prompt_cache_ram_mib }}
      --cache-idle-slots
      --n-predict {{ llama_n_predict_3090 }}
      --n-gpu-layers 99
      -sm tensor
      --fit off
      -fa on
      --cache-type-k q4_0
      --cache-type-v q4_0
      --temp 1.0
      --top-p 0.95
      --top-k 64
      --spec-type draft-mtp
      --spec-draft-n-max 4
      --reasoning on
      --jinja
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    context_window: "{{ llama_ctx_size_gemma4_31b_3090 }}"
    max_input_tokens: "{{ llama_ctx_size_gemma4_31b_3090 }}"
    max_output_tokens: "{{ llama_n_predict_3090 }}"
    allowed_openai_params:
      - extra_body
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{gpu_3090_0_uuid}},{{gpu_3090_1_uuid}}"
    variants:
      nothink:
        temperature: 1.0
        top_p: 0.95
        extra_body:
          cache_prompt: true
          chat_template_kwargs:
            enable_thinking: false


  - alias: qwen3-embedding
    # Default embedding runtime: enough headroom for ~400 token chunks plus
    # wrappers/metadata without reserving long-document KV by default.
    # Lower-memory fallback: 2048/512/512. Long-document case: 8192/2048/2048.
    cmd: >-
      /app/llama-server
      -hf PeterAM4/Qwen3-Embedding-0.6B-GGUF:Q4_K_M-imat
      --port ${PORT}
      --embeddings
      --ctx-size 4096
      --batch-size 1024
      --ubatch-size 1024
      --cache-type-k q8_0
      --cache-type-v q8_0
      --n-gpu-layers 99
    supports_function_calling: false
    supports_vision: false
    supports_reasoning: false
    context_window: 4096
    max_input_tokens: 4096
    encoding_format: "float"
    group: "forever"
    env:
      - "CUDA_VISIBLE_DEVICES={{gpu_3090_0_uuid}}"


  - alias: qwen3-tts
    # OpenAI-compatible stable TTS runtime. VoiceDesign prepares missing
    # reference WAVs once; runtime requests use Base voice cloning with cached
    # speaker embeddings. Keep it on GPU1 so embeddings and TTS do not contend.
    cmd: >-
      /app/qwen3-tts-venv/bin/python {{ llamaswap_qwen3_tts_server_container_script }}
      --runtime-model {{ llamaswap_qwen3_tts_runtime_model }}
      --design-model {{ llamaswap_qwen3_tts_design_model }}
      --presets {{ llamaswap_qwen3_tts_presets_container_path }}
      --voice-cache-dir {{ llamaswap_qwen3_tts_voice_cache_container_path }}
      --voice-cache-probe-text "{{ llamaswap_qwen3_tts_voice_cache_probe_text }}"
      --host 0.0.0.0
      --port ${PORT}
      --device cuda
      --cache-dir /app/.uv-cache
    supports_function_calling: false
    supports_vision: false
    supports_reasoning: false
    group: "forever"
    env:
      - "CUDA_VISIBLE_DEVICES={{gpu_3090_1_uuid}}"
      - "UV_CACHE_DIR=/app/.uv-cache"

llamaswap_model_groups:
  forever:
    persistent: true
    swap: false
    exclusive: false
  "3090":
    swap: true
    exclusive: false

llamaswap_preload:
  - "{{ model_group_alias['home-embed'] }}"
  - "qwen3-tts"
  - "Qwen3.6-27B-Instruct"
