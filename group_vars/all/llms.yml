model_group_alias:
  home: "Qwen3.6-35B-A3B-Instruct-nothink"
  home-fast: "Qwen3.6-35B-A3B-Instruct-nothink"
  home-smart: "Qwen3.6-35B-A3B-Instruct-misc"
  home-vision: "Qwen3.6-35B-A3B-Instruct-misc"
  home-ha: "Qwen3.6-35B-A3B-Instruct-ha"
  home-claw: "Qwen3.6-35B-A3B-Instruct-openclaw"
  home-embed: "qwen3-embedding"
  home-remote: "google/gemini-3-flash-preview"

# Shared memory reservation knobs for the 24 GiB RTX 3090.
# Keep ~2 GiB out of vLLM's hands and let llama.cpp fit against ~2 GiB free.
vllm_gpu_memory_utilization_3090: 0.92
vllm_startup_delay_seconds: 5
llama_fit_target_3090_mb: 2000
llama_prompt_cache_parallel_slots: 3
# Fixed total ctx for the 3 dedicated llama.cpp slots on the 3090.
# Sized so qwen3-embedding can stay resident while leaving about ~1 GiB free
# on the GPU for llama.cpp compute buffers and transient pressure.
llama_ctx_size_qwen35_3090: 430080
llama_ctx_size_qwen27_3090: 198144

litellm_fallbacks:
  - home: ["home-remote"]
  - home-fast: ["home-remote"]
  - home-smart: ["home-remote"]

openrouter_models:
  - openai/gpt-5.4
  - anthropic/claude-haiku-4.5
  - anthropic/claude-sonnet-4.6
  - anthropic/claude-opus-4.6
  - minimax/minimax-m2.7
  - google/gemini-3-flash-preview

llamaswap_models:
  # Keep public model IDs stable once exposed via LiteLLM/LlamaSwap.
  # Existing aliases are mixed-case because clients may already depend on them.
  # For new entries, prefer the upstream model family name plus a backend suffix
  # only when we expose multiple runtimes of the same base model.

  - alias: Qwen3.6-35B-A3B-Instruct
    # Use three explicit llama-server slots so Home Assistant and OpenClaw can
    # keep stable prompt caches on dedicated slots while miscellaneous traffic
    # is routed to a third slot. Fix ctx-size explicitly so the slot budget is
    # stable even when qwen3-embedding is already resident on the 3090.
    cmd: >-
      /app/llama-server
      -hf unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q3_K_XL
      --port ${PORT}
      --ctx-size {{ llama_ctx_size_qwen35_3090 }}
      --parallel {{ llama_prompt_cache_parallel_slots }}
      --slot-save-path /app/.cache/qwen3.6-slots
      --n-predict 32768
      --n-gpu-layers 99
      -fa on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --temp 1.0
      --top-p 0.95
      --top-k 20
      --min-p 0.0
      --presence-penalty 1.5
      --jinja
      --fit on
      --fit-target {{ llama_fit_target_3090_mb }}
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    allowed_openai_params:
      - extra_body
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{ampere_gpu_uuid}}"
    variants:
      nothink:
        temperature: 0.7
        top_p: 0.8
        extra_body:
          id_slot: 2
          cache_prompt: true
          chat_template_kwargs:
            enable_thinking: false
      ha:
        extra_body:
          id_slot: 0
          cache_prompt: true
      openclaw:
        extra_body:
          id_slot: 1
          cache_prompt: true
      misc:
        extra_body:
          id_slot: 2
          cache_prompt: true

  - alias: Qwen3.6-27B-Instruct
    # Keep the same dedicated prompt-cache slot layout as the 35B entry so the
    # Home Assistant and OpenClaw routes can retain stable caches. Cap ctx-size
    # lower than the 35B entry so qwen3-embedding can stay loaded on the 3090.
    cmd: >-
      /app/llama-server
      -hf unsloth/Qwen3.6-27B-GGUF:UD-Q3_K_XL
      --port ${PORT}
      --ctx-size {{ llama_ctx_size_qwen27_3090 }}
      --parallel {{ llama_prompt_cache_parallel_slots }}
      --slot-save-path /app/.cache/qwen3.6-27b-slots
      --n-predict 32768
      --n-gpu-layers 99
      -fa on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --temp 1.0
      --top-p 0.95
      --top-k 20
      --min-p 0.0
      --presence-penalty 1.5
      --jinja
      --fit on
      --fit-target {{ llama_fit_target_3090_mb }}
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    allowed_openai_params:
      - extra_body
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{ampere_gpu_uuid}}"
    variants:
      nothink:
        temperature: 0.7
        top_p: 0.8
        extra_body:
          id_slot: 2
          cache_prompt: true
          chat_template_kwargs:
            enable_thinking: false
      ha:
        extra_body:
          id_slot: 0
          cache_prompt: true
      openclaw:
        extra_body:
          id_slot: 1
          cache_prompt: true
      misc:
        extra_body:
          id_slot: 2
          cache_prompt: true


  - alias: Qwen3.6-27B-AWQ-vllm
    # cyankiwi AWQ variant — same base model as Qwen/Qwen3.5-27B-GPTQ-Int4
    # but uses compressed-tensors quantization which vLLM auto-detects.
    # Vision can fit alongside qwen3-embedding on the 24 GB 3090, but this is
    # still a tight config: 1 concurrent seq, FP8 KV cache, and a fixed VRAM
    # budget via gpu-memory-utilization. Large image batches may still OOM.
    # Allow request-level extra_body through LiteLLM so callers can pass
    # llama.cpp/vLLM-specific request fields such as chat_template_kwargs.
    cmd: >-
      vllm-delayed {{ vllm_startup_delay_seconds }} serve cyankiwi/Qwen3.6-27B-AWQ-INT4
      --host 0.0.0.0
      --port ${PORT}
      --served-model-name Qwen3.6-27B-AWQ-vllm
      --gpu-memory-utilization {{ vllm_gpu_memory_utilization_3090 }}
      --max-model-len auto
      --max-num-seqs 1
      --enable-prefix-caching
      --kv-cache-dtype fp8_e4m3
      --enforce-eager
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --trust-remote-code
    litellm_provider: hosted_vllm
    allowed_openai_params:
      - extra_body
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES=0"
      - "OMP_NUM_THREADS=4"
    variants:
      nothink:
        temperature: 0.7
        top_p: 0.8
        extra_body:
          chat_template_kwargs:
            enable_thinking: false


  - alias: qwen3-embedding
    # Default embedding runtime: enough headroom for ~400 token chunks plus
    # wrappers/metadata without reserving long-document KV by default.
    # Lower-memory fallback: 2048/512/512. Long-document case: 8192/2048/2048.
    cmd: >-
      /app/llama-server
      -hf PeterAM4/Qwen3-Embedding-0.6B-GGUF:Q4_K_M-imat
      --port ${PORT}
      --embeddings
      --ctx-size 4096
      --batch-size 1024
      --ubatch-size 1024
      --cache-type-k q8_0
      --cache-type-v q8_0
      --n-gpu-layers 99
    supports_function_calling: false
    supports_vision: false
    supports_reasoning: false
    encoding_format: "float"
    group: "forever"
    env:
      - "CUDA_VISIBLE_DEVICES={{ampere_gpu_uuid}}"

llamaswap_model_groups:
  forever:
    persistent: true
    swap: false
    exclusive: false
  "3090":
    swap: true
    exclusive: false

llamaswap_preload:
  - "{{ model_group_alias['home-fast'] }}"
