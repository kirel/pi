llamaswap_enabled: true

model_group_alias:
  home: "Qwen3.6-35B-A3B-Instruct-nothink"
  home-fast: "Qwen3.6-35B-A3B-Instruct-nothink"
  home-smart: "Qwen3.6-35B-A3B-Instruct-misc"
  home-vision: "Qwen3.6-35B-A3B-Instruct-misc"
  home-ha: "Qwen3.6-35B-A3B-Instruct-ha"
  home-hermes: "Qwen3.6-35B-A3B-Instruct-hermes"
  home-embed: "qwen3-embedding"
  home-remote: "google/gemini-3-flash-preview"

# llama.cpp --fit is not implemented for tensor split mode.
llama_prompt_cache_parallel_slots: 3
# Fixed total ctx for the 3 dedicated llama.cpp slots on the 3090.
# MTP GGUFs are slightly larger than the base GGUFs, so keep a little more
# headroom while qwen3-embedding and speech services can stay resident.
llama_ctx_size_qwen35_3090: 458752
llama_ctx_size_qwen27_3090: 458752
llama_ctx_size_gemma4_26b_3090: 458752
llama_ctx_size_gemma4_31b_3090: 458752
llama_n_predict_3090: 32768

litellm_fallbacks:
  - home: ["home-remote"]
  - home-fast: ["home-remote"]
  - home-smart: ["home-remote"]

openrouter_models:
  - openai/gpt-5.5
  - anthropic/claude-haiku-4.5
  - anthropic/claude-sonnet-4.6
  - anthropic/claude-opus-4.8
  - deepseek/deepseek-v4-flash
  - deepseek/deepseek-v4-pro
  - google/gemini-3.5-flash
  - google/gemini-3.1-flash-lite

litellm_extra_models:
  - model_name: minimax-m3
    litellm_params:
      model: minimax/MiniMax-M3
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/v1
    # MiniMax-M3 is a reasoning-capable multimodal model (per pi-ai catalog);
    # declare capabilities so LiteLLM reports them via /model/info and clients
    # like pi-provider-litellm enable thinking/vision instead of falling back
    # to supports_reasoning=false on /v1/models-only discovery.
    model_info:
      supports_reasoning: true
      supports_vision: true

  - model_name: glm-5.2
    litellm_params:
      model: openai/glm-5.2
      api_key: os.environ/ZAI_API_KEY
      api_base: https://api.z.ai/api/coding/paas/v4
    # GLM-5.2 supports extended thinking (zai thinkingFormat); LiteLLM's
    # /v1/models fallback doesn't expose supports_reasoning, so declare it
    # here. The zai compat/thinkingFormat is matched by pi via the catalog id.
    model_info:
      supports_reasoning: true

llamaswap_models:
  # Keep public model IDs stable once exposed via LiteLLM/LlamaSwap.
  # Existing aliases are mixed-case because clients may already depend on them.
  # For new entries, prefer the upstream model family name plus a backend suffix
  # only when we expose multiple runtimes of the same base model.

  - alias: Qwen3.6-35B-A3B-Instruct
    # Use three explicit llama-server slots so Home Assistant and Hermes can
    # keep stable prompt caches on dedicated slots while miscellaneous traffic
    # is routed to a third slot. Fix ctx-size explicitly so the slot budget is
    # stable even when qwen3-embedding is already resident on the 3090.
    cmd: >-
      /app/llama-server
      -hf unsloth/Qwen3.6-35B-A3B-MTP-GGUF:UD-Q4_K_XL
      --port ${PORT}
      --ctx-size {{ llama_ctx_size_qwen35_3090 }}
      --parallel {{ llama_prompt_cache_parallel_slots }}
      --slot-save-path /app/.cache/qwen3.6-mtp-slots
      --n-predict {{ llama_n_predict_3090 }}
      --n-gpu-layers 99
      -sm tensor
      --fit off
      -fa on
      --cache-type-k q4_0
      --cache-type-v q4_0
      --temp 1.0
      --top-p 0.95
      --top-k 20
      --min-p 0.0
      --presence-penalty 1.5
      --spec-type draft-mtp
      --spec-draft-n-max 2
      --chat-template-kwargs '{"preserve_thinking": true}'
      --jinja
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    context_window: "{{ (llama_ctx_size_qwen35_3090 / llama_prompt_cache_parallel_slots) | int }}"
    max_input_tokens: "{{ ((llama_ctx_size_qwen35_3090 / llama_prompt_cache_parallel_slots) | int) - llama_n_predict_3090 }}"
    max_output_tokens: "{{ llama_n_predict_3090 }}"
    allowed_openai_params:
      - extra_body
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{gpu_3090_0_uuid}},{{gpu_3090_1_uuid}}"
    variants:
      nothink:
        temperature: 0.7
        top_p: 0.8
        extra_body:
          id_slot: 2
          cache_prompt: true
          chat_template_kwargs:
            enable_thinking: false
      ha:
        extra_body:
          id_slot: 0
          cache_prompt: true
      hermes:
        temperature: 0.6
        top_p: 0.95
        presence_penalty: 0.0
        extra_body:
          id_slot: 1
          cache_prompt: true
      misc:
        extra_body:
          id_slot: 2
          cache_prompt: true

  - alias: Qwen3.6-27B-Instruct
    # Keep the same dedicated prompt-cache slot layout as the 35B entry so the
    # Home Assistant and Hermes routes can retain stable caches. Cap ctx-size
    # lower than the 35B entry so qwen3-embedding can stay loaded on the 3090.
    cmd: >-
      /app/llama-server
      -hf unsloth/Qwen3.6-27B-MTP-GGUF:UD-Q3_K_XL
      --port ${PORT}
      --ctx-size {{ llama_ctx_size_qwen27_3090 }}
      --parallel {{ llama_prompt_cache_parallel_slots }}
      --slot-save-path /app/.cache/qwen3.6-27b-mtp-slots
      --n-predict {{ llama_n_predict_3090 }}
      --n-gpu-layers 99
      -sm tensor
      --fit off
      -fa on
      --cache-type-k q4_0
      --cache-type-v q4_0
      --temp 1.0
      --top-p 0.95
      --top-k 20
      --min-p 0.0
      --presence-penalty 1.5
      --spec-type draft-mtp
      --spec-draft-n-max 2
      --chat-template-kwargs '{"preserve_thinking": true}'
      --jinja
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    context_window: "{{ (llama_ctx_size_qwen27_3090 / llama_prompt_cache_parallel_slots) | int }}"
    max_input_tokens: "{{ ((llama_ctx_size_qwen27_3090 / llama_prompt_cache_parallel_slots) | int) - llama_n_predict_3090 }}"
    max_output_tokens: "{{ llama_n_predict_3090 }}"
    allowed_openai_params:
      - extra_body
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{gpu_3090_0_uuid}},{{gpu_3090_1_uuid}}"
    variants:
      nothink:
        temperature: 0.7
        top_p: 0.8
        extra_body:
          id_slot: 2
          cache_prompt: true
          chat_template_kwargs:
            enable_thinking: false
      ha:
        extra_body:
          id_slot: 0
          cache_prompt: true
      hermes:
        temperature: 0.6
        top_p: 0.95
        presence_penalty: 0.0
        extra_body:
          id_slot: 1
          cache_prompt: true
      misc:
        extra_body:
          id_slot: 2
          cache_prompt: true

  - alias: Gemma-4-26B-A4B-it-qat
    # Gemma 4 QAT uses one recommended GGUF quant (UD-Q4_K_XL). The same
    # Hugging Face repo includes mtp-* GGUFs, and current llama.cpp enables
    # Gemma MTP from -hf plus --spec-type draft-mtp without a separate draft HF.
    cmd: >-
      /app/llama-server
      -hf unsloth/gemma-4-26B-A4B-it-qat-GGUF:UD-Q4_K_XL
      --port ${PORT}
      --ctx-size {{ llama_ctx_size_gemma4_26b_3090 }}
      --parallel {{ llama_prompt_cache_parallel_slots }}
      --slot-save-path /app/.cache/gemma-4-26b-a4b-qat-slots
      --n-predict {{ llama_n_predict_3090 }}
      --n-gpu-layers 99
      -sm tensor
      --fit off
      -fa on
      --cache-type-k q4_0
      --cache-type-v q4_0
      --temp 1.0
      --top-p 0.95
      --top-k 64
      --spec-type draft-mtp
      --spec-draft-n-max 2
      --chat-template-kwargs '{"enable_thinking": true}'
      --jinja
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    context_window: "{{ (llama_ctx_size_gemma4_26b_3090 / llama_prompt_cache_parallel_slots) | int }}"
    max_input_tokens: "{{ ((llama_ctx_size_gemma4_26b_3090 / llama_prompt_cache_parallel_slots) | int) - llama_n_predict_3090 }}"
    max_output_tokens: "{{ llama_n_predict_3090 }}"
    allowed_openai_params:
      - extra_body
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{gpu_3090_0_uuid}},{{gpu_3090_1_uuid}}"
    variants:
      nothink:
        temperature: 1.0
        top_p: 0.95
        extra_body:
          id_slot: 2
          cache_prompt: true
          chat_template_kwargs:
            enable_thinking: false
      ha:
        extra_body:
          id_slot: 0
          cache_prompt: true
      hermes:
        temperature: 1.0
        top_p: 0.95
        presence_penalty: 0.0
        extra_body:
          id_slot: 1
          cache_prompt: true
      misc:
        extra_body:
          id_slot: 2
          cache_prompt: true

  - alias: Gemma-4-31B-it-qat
    # Gemma 4 QAT 31B with same-repo mtp-* GGUF auto-loaded by llama.cpp
    # from -hf plus --spec-type draft-mtp.
    cmd: >-
      /app/llama-server
      -hf unsloth/gemma-4-31B-it-qat-GGUF:UD-Q4_K_XL
      --port ${PORT}
      --ctx-size {{ llama_ctx_size_gemma4_31b_3090 }}
      --parallel {{ llama_prompt_cache_parallel_slots }}
      --slot-save-path /app/.cache/gemma-4-31b-qat-slots
      --n-predict {{ llama_n_predict_3090 }}
      --n-gpu-layers 99
      -sm tensor
      --fit off
      -fa on
      --cache-type-k q4_0
      --cache-type-v q4_0
      --temp 1.0
      --top-p 0.95
      --top-k 64
      --spec-type draft-mtp
      --spec-draft-n-max 2
      --chat-template-kwargs '{"enable_thinking": true}'
      --jinja
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    context_window: "{{ (llama_ctx_size_gemma4_31b_3090 / llama_prompt_cache_parallel_slots) | int }}"
    max_input_tokens: "{{ ((llama_ctx_size_gemma4_31b_3090 / llama_prompt_cache_parallel_slots) | int) - llama_n_predict_3090 }}"
    max_output_tokens: "{{ llama_n_predict_3090 }}"
    allowed_openai_params:
      - extra_body
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{gpu_3090_0_uuid}},{{gpu_3090_1_uuid}}"
    variants:
      nothink:
        temperature: 1.0
        top_p: 0.95
        extra_body:
          id_slot: 2
          cache_prompt: true
          chat_template_kwargs:
            enable_thinking: false
      ha:
        extra_body:
          id_slot: 0
          cache_prompt: true
      hermes:
        temperature: 1.0
        top_p: 0.95
        presence_penalty: 0.0
        extra_body:
          id_slot: 1
          cache_prompt: true
      misc:
        extra_body:
          id_slot: 2
          cache_prompt: true


  - alias: qwen3-embedding
    # Default embedding runtime: enough headroom for ~400 token chunks plus
    # wrappers/metadata without reserving long-document KV by default.
    # Lower-memory fallback: 2048/512/512. Long-document case: 8192/2048/2048.
    cmd: >-
      /app/llama-server
      -hf PeterAM4/Qwen3-Embedding-0.6B-GGUF:Q4_K_M-imat
      --port ${PORT}
      --embeddings
      --ctx-size 4096
      --batch-size 1024
      --ubatch-size 1024
      --cache-type-k q8_0
      --cache-type-v q8_0
      --n-gpu-layers 99
    supports_function_calling: false
    supports_vision: false
    supports_reasoning: false
    context_window: 4096
    max_input_tokens: 4096
    encoding_format: "float"
    group: "forever"
    env:
      - "CUDA_VISIBLE_DEVICES={{gpu_3090_0_uuid}}"


  - alias: qwen3-tts
    # OpenAI-compatible stable TTS runtime. VoiceDesign prepares missing
    # reference WAVs once; runtime requests use Base voice cloning with cached
    # speaker embeddings. Keep it on GPU1 so embeddings and TTS do not contend.
    cmd: >-
      /app/qwen3-tts-venv/bin/python {{ llamaswap_qwen3_tts_server_container_script }}
      --runtime-model {{ llamaswap_qwen3_tts_runtime_model }}
      --design-model {{ llamaswap_qwen3_tts_design_model }}
      --presets {{ llamaswap_qwen3_tts_presets_container_path }}
      --voice-cache-dir {{ llamaswap_qwen3_tts_voice_cache_container_path }}
      --voice-cache-probe-text "{{ llamaswap_qwen3_tts_voice_cache_probe_text }}"
      --host 0.0.0.0
      --port ${PORT}
      --device cuda
      --cache-dir /app/.uv-cache
    supports_function_calling: false
    supports_vision: false
    supports_reasoning: false
    group: "forever"
    env:
      - "CUDA_VISIBLE_DEVICES={{gpu_3090_1_uuid}}"
      - "UV_CACHE_DIR=/app/.uv-cache"

llamaswap_model_groups:
  forever:
    persistent: true
    swap: false
    exclusive: false
  "3090":
    swap: true
    exclusive: false

llamaswap_preload:
  - "{{ model_group_alias['home-embed'] }}"
  - "qwen3-tts"
  - "{{ model_group_alias['home-fast'] }}"
