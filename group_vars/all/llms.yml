model_group_alias:
  home: "Qwen3.5-35B-A3B-Instruct-nothink"
  home-fast: "Qwen3.5-35B-A3B-Instruct-nothink"
  home-smart: "Qwen3.5-35B-A3B-Instruct"
  home-vision: "Qwen3.5-35B-A3B-Instruct"
  home-tiny: "Qwen3.5-35B-A3B-Instruct-nothink"
  home-embed: "qwen3-embedding"

litellm_fallbacks:
  - home: ["home-tiny", "home-remote"]
  - home-fast: ["home-tiny", "home-remote"]
  - home-smart: ["home-remote"]

openrouter_models:
  - openai/gpt-5.4
  - anthropic/claude-haiku-4.5
  - anthropic/claude-sonnet-4.6
  - anthropic/claude-opus-4.6
  - minimax/minimax-m2.5

llamaswap_models:
  - alias: Qwen3-Coder-30B-A3B-Instruct
    cmd: >-
      /app/llama-server
      -hf unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF:Q4_K_XL
      --port ${PORT}
      --n-predict 32768
      --n-gpu-layers 99
      -fa on
      --cache-type-k q4_0
      --cache-type-v q4_0
      --temp 0.7
      --min-p 0.0
      --top-p 0.80
      --top-k 20
      --repeat-penalty 1.05
      --jinja
      --fit on
      --fit-target 2500
    supports_function_calling: true
    supports_vision: false
    supports_reasoning: false
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{ampere_gpu_uuid}}"

  - alias: Devstral-Small-2-24B-Instruct
    cmd: >-
      /app/llama-server
      -hf unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF:Q5_K_XL
      --port ${PORT}
      --n-predict 32768
      --n-gpu-layers 99
      -fa on
      --cache-type-k q4_0
      --cache-type-v q4_0
      --temp 0.15
      --min-p 0.01
      --jinja
      --fit on
      --fit-target 2500
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: false
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{ampere_gpu_uuid}}"

  - alias: Qwen3.5-35B-A3B-Instruct
    cmd: >-
      /app/llama-server
      -hf unsloth/Qwen3.5-35B-A3B-GGUF:UD-Q3_K_XL
      --port ${PORT}
      --n-predict 32768
      --n-gpu-layers 99
      -fa on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --temp 1.0
      --top-p 0.95
      --top-k 20
      --min-p 0.0
      --presence-penalty 1.5
      --jinja
      --fit on
      --fit-target 2500
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{ampere_gpu_uuid}}"
    variants:
      nothink:
        temperature: 0.7
        top_p: 0.8
        chat_template_kwargs:
          enable_thinking: false

  - alias: Qwen3.5-27B-Instruct
    cmd: >-
      /app/llama-server
      -hf unsloth/Qwen3.5-27B-GGUF:UD-Q4_K_XL
      --port ${PORT}
      --n-predict 32768
      --n-gpu-layers 99
      -fa on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --temp 1.0
      --top-p 0.95
      --top-k 20
      --min-p 0.0
      --presence-penalty 1.5
      --jinja
      --fit on
      --fit-target 2500
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{ampere_gpu_uuid}}"
    variants:
      nothink:
        temperature: 0.7
        top_p: 0.8
        chat_template_kwargs:
          enable_thinking: false

  - alias: GPT-OSS-20B-F16
    cmd: >-
      /app/llama-server
      -hf unsloth/gpt-oss-20b-GGUF:F16
      --port ${PORT}
      --n-predict 16384
      --n-gpu-layers 99
      --cache-type-k q8_0
      --cache-type-v q8_0
      -fa on
      --temp 1.0
      --top-p 1.0
      --top-k 0
      --jinja
      --fit on
      --fit-target 2500
    supports_function_calling: true
    supports_vision: false
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{ampere_gpu_uuid}}"
    variants:
      high:
        chat_template_kwargs:
          reasoning_effort: "high"
      low:
        chat_template_kwargs:
          reasoning_effort: "low"

  - alias: gemma-4-31B-it-AWQ
    cmd: >-
      vllm-delayed 15 serve QuantTrio/gemma-4-31B-it-AWQ
      --host 0.0.0.0
      --port ${PORT}
      --served-model-name gemma-4-31B-it-AWQ
      --quantization awq_marlin
      --gpu-memory-utilization 0.95
      --max-model-len 2048
      --max-num-seqs 4
      --enforce-eager
      --enable-auto-tool-choice
      --tool-call-parser gemma4
      --reasoning-parser gemma4
      --trust-remote-code
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    group: "3090"
    # vLLM can't parse GPU UUIDs in CUDA_VISIBLE_DEVICES (breaks at import
    # time in w8a8_utils.py). Use index 0 instead — the container's
    # device_requests already pins it to the Ampere GPU.
    env:
      - "CUDA_VISIBLE_DEVICES=0"
      - "OMP_NUM_THREADS=4"

  - alias: gemma-4-26B-A4B-gguf
    cmd: >-
      /app/llama-server
      -hf unsloth/gemma-4-26B-A4B-it-GGUF:UD-Q4_K_XL
      --port ${PORT}
      --n-predict 32768
      --n-gpu-layers 99
      -fa on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --temp 1.0
      --top-p 0.95
      --top-k 64
      --jinja
      --fit on
      --fit-target 2500
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES={{ampere_gpu_uuid}}"
    variants:
      nothink:
        temperature: 0.7
        top_p: 0.8
        chat_template_kwargs:
          enable_thinking: false

  - alias: gemma-4-26B-A4B-vllm
    # sleep 15: give the previous model's GPU memory time to be released by
    # the CUDA driver before vLLM probes the device. Without it, fast swaps
    # from a llama.cpp model see stale "in-use" VRAM and OOM at startup.
    cmd: >-
      vllm-delayed 15 serve cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
      --host 0.0.0.0
      --port ${PORT}
      --served-model-name gemma-4-26B-A4B-vllm
      --gpu-memory-utilization 0.95
      --max-model-len 16384
      --max-num-seqs 8
      --enforce-eager
      --enable-auto-tool-choice
      --tool-call-parser gemma4
      --reasoning-parser gemma4
      --trust-remote-code
    supports_function_calling: true
    supports_vision: true
    supports_reasoning: true
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES=0"
      - "OMP_NUM_THREADS=4"

  # SGLang experiment paused for now. QuantTrio/Qwen3.5-27B-AWQ loads, but
  # generation fails in SGLang's Triton Mamba kernel on RTX 3090 with a
  # bf16/fp16 type mismatch. Keep vLLM as the active backend for 27B AWQ.
  #
  # - alias: Qwen3.5-27B-sglang
  #   cmd: >-
  #     sglang-delayed 15
  #     --model-path QuantTrio/Qwen3.5-27B-AWQ
  #     --host 0.0.0.0
  #     --port ${PORT}
  #     --served-model-name Qwen3.5-27B-sglang
  #     --mem-fraction-static 0.94
  #     --context-length 4096
  #     --max-running-requests 1
  #     --max-total-tokens 4096
  #     --kv-cache-dtype fp8_e4m3
  #     --attention-backend flashinfer
  #     --enable-hierarchical-cache
  #     --hicache-ratio 2.0
  #     --enable-multimodal
  #     --tool-call-parser qwen3_coder
  #     --reasoning-parser qwen3
  #     --trust-remote-code
  #   supports_function_calling: true
  #   supports_vision: true
  #   supports_reasoning: true
  #   group: "3090"
  #   env:
  #     - "CUDA_VISIBLE_DEVICES=0"
  #     - "OMP_NUM_THREADS=4"

  - alias: Qwen3.5-35B-A3B-GPTQ-Int4
    # 24 GB Ampere can't fit this model with vision (weights + vision encoder
    # + mamba state ≈ 21 GiB before KV cache). Vision is disabled here so it
    # fits with a useful context. Use the 27B variant for vision.
    cmd: >-
      vllm-delayed 15 serve Qwen/Qwen3.5-35B-A3B-GPTQ-Int4
      --host 0.0.0.0
      --port ${PORT}
      --served-model-name Qwen3.5-35B-A3B-GPTQ-Int4
      --quantization moe_wna16
      --gpu-memory-utilization 0.88
      --max-model-len 16384
      --max-num-seqs 4
      --language-model-only
      --enforce-eager
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --trust-remote-code
    supports_function_calling: true
    supports_vision: false
    supports_reasoning: true
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES=0"
      - "OMP_NUM_THREADS=4"

  - alias: Qwen3.5-27B-AWQ
    # cyankiwi AWQ variant — same base model as Qwen/Qwen3.5-27B-GPTQ-Int4
    # but uses compressed-tensors quantization which vLLM auto-detects.
    # Start conservatively on the 24 GB 3090: language-only, 16k context,
    # 2 concurrent seqs, and FP8 KV cache to reduce KV memory pressure.
    # --calculate-kv-scales avoids falling back to 1.0 KV scales when the
    # checkpoint does not provide them.
    # Allow request-level chat_template_kwargs through LiteLLM so callers can
    # dynamically set {"enable_thinking": false} per request.
    cmd: >-
      vllm-delayed 15 serve cyankiwi/Qwen3.5-27B-AWQ-4bit
      --host 0.0.0.0
      --port ${PORT}
      --served-model-name Qwen3.5-27B-AWQ
      --gpu-memory-utilization 0.85
      --max-model-len 16384
      --max-num-seqs 2
      --kv-cache-dtype fp8_e4m3
      --calculate-kv-scales
      --language-model-only
      --enforce-eager
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --trust-remote-code
    litellm_provider: hosted_vllm
    allowed_openai_params:
      - chat_template_kwargs
      - extra_body
    supports_function_calling: true
    supports_vision: false
    supports_reasoning: true
    group: "3090"
    env:
      - "CUDA_VISIBLE_DEVICES=0"
      - "OMP_NUM_THREADS=4"

  - alias: embeddinggemma
    cmd: >-
      /app/llama-server
      -hf ggml-org/embeddinggemma-300m-qat-q8_0-GGUF
      --port ${PORT}
      --embeddings
      --ctx-size 8192
      --batch-size 8192
      --n-gpu-layers 99
      --fit off
    supports_function_calling: false
    supports_vision: false
    supports_reasoning: false
    encoding_format: "float"
    group: "forever"
    env:
      - "CUDA_VISIBLE_DEVICES={{ampere_gpu_uuid}}"

  - alias: qwen3-embedding
    cmd: >-
      /app/llama-server
      -hf Qwen/Qwen3-Embedding-0.6B-GGUF:Q8_0
      --port ${PORT}
      --embeddings
      --ctx-size 8192
      --batch-size 8192
      --n-gpu-layers 99
    supports_function_calling: false
    supports_vision: false
    supports_reasoning: false
    encoding_format: "float"
    group: "forever"
    env:
      - "CUDA_VISIBLE_DEVICES={{ampere_gpu_uuid}}"

llamaswap_model_groups:
  forever:
    persistent: true
    swap: false
    exclusive: false
  "3090":
    swap: true
    exclusive: false

llamaswap_preload:
  - "{{ model_group_alias['home-tiny'] }}"
  - "{{ model_group_alias['home-fast'] }}"
